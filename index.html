<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音声・テキストレコーダー v1.7.7</title>
    <style>
        /* ステップ4: カラーパレットをライトモードへ刷新 */
        :root {
            --bg-color: #ffffff;
            --card-bg: #f8fafc;
            --text-color: #1e293b;
            --text-muted: #64748b;
            --accent-color: #4f46e5; /* ターゲットデザイン風のブルー */
            --border-color: #e2e8f0;
            --spacing-md: 16px;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: var(--spacing-md); height: 100dvh; display: flex; flex-direction: column; align-items: center; }
        
        .container { width: 100%; max-width: 500px; height: 100%; display: flex; flex-direction: column; gap: var(--spacing-md); }
        
        #result-area { flex: 1; background: var(--card-bg); border-radius: 20px; padding: var(--spacing-md); overflow-y: auto; white-space: pre-wrap; border: 1px solid var(--border-color); color: var(--text-color); }
        
        #settings-panel { display: none; background: #f1f5f9; padding: var(--spacing-md); border-radius: 16px; font-size: 0.85rem; color: var(--text-muted); }
        
        .action-row { display: flex; gap: 10px; }
        .sec-btn { flex: 1; background: #ffffff; color: var(--text-color); border: 1px solid var(--border-color); padding: 14px; border-radius: 16px; cursor: pointer; font-weight: 600; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="container">
        <button onclick="document.getElementById('settings-panel').style.display = document.getElementById('settings-panel').style.display === 'block' ? 'none' : 'block'" style="background:none; border:none; color:var(--text-muted); text-align:right; font-size: 0.9rem;">⚙️ 設定</button>
        <div id="settings-panel">設定項目をここに集約。</div>
        <div id="result-area"></div>
        <div class="action-row">
            <button id="clear-btn" class="sec-btn">消去</button>
        </div>
    </div>
    <script>
        const APP_VERSION = "1.7.7";
    </script>
</body>
</html>
