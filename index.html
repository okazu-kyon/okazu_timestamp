<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音声・テキストレコーダー v1.8.0</title>
    <style>
        :root { --bg-color: #ffffff; --text-color: #1e293b; --accent-color: #4f46e5; --border-color: #e2e8f0; --spacing-md: 16px; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: var(--spacing-md); height: 100dvh; display: flex; flex-direction: column; }
        .container { flex: 1; display: flex; flex-direction: column; gap: var(--spacing-md); max-width: 500px; margin: 0 auto; width: 100%; }
        #result-area { flex: 1; border: 1px solid var(--border-color); border-radius: 20px; padding: var(--spacing-md); overflow-y: auto; white-space: pre-wrap; }
        #main-btn { background: var(--accent-color); color: white; border: none; padding: 20px; border-radius: 30px; font-weight: bold; }
        #main-btn.recording { background: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <div id="result-area"></div>
        <button id="main-btn">録音を開始</button>
    </div>
    <script>
        const APP_VERSION = "1.8.0";
        const resultArea = document.getElementById('result-area');
        const mainBtn = document.getElementById('main-btn');

        // 音声認識の初期設定
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.interimResults = true;
        recognition.continuous = true;

        let isRecording = false;

        mainBtn.onclick = () => {
            if (isRecording) {
                recognition.stop();
                mainBtn.innerText = "録音を開始";
                mainBtn.classList.remove('recording');
            } else {
                recognition.start();
                mainBtn.innerText = "録音を停止";
                mainBtn.classList.add('recording');
            }
            isRecording = !isRecording;
        };

        recognition.onresult = (event) => {
            let transcript = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
                transcript += event.results[i][0].transcript;
            }
            resultArea.innerText = transcript;
        };

        recognition.onerror = (e) => console.error("音声認識エラー:", e);
    </script>
</body>
</html>
