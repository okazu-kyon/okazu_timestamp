<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="icon.png">
    <title>音声・テキストレコーダー v2.2.3 (富山消防・強制割込版)</title>
    <style>
        :root { 
            --bg-color: #ffffff; 
            --text-color: #1e293b; 
            --accent-color: #ef4444; 
            --border-color: #e2e8f0; 
        }
        body { 
            font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 16px; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            box-sizing: border-box;
            overflow: hidden;
            touch-action: manipulation;
        }
        .container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            max-width: 500px; 
            margin: 0 auto; 
            width: 100%; 
            height: 100%;
        }
        #result-area { 
            flex: 0 1 60%; 
            border: 2px solid var(--border-color); 
            border-radius: 20px; 
            padding: 15px; 
            overflow-y: auto; 
            white-space: pre-wrap; 
            font-size: 0.9rem; 
            line-height: 1.6;
            background: #fafafa;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 10px;
        }
        #main-btn { 
            width: 70px; 
            height: 70px; 
            border-radius: 50%; 
            background: var(--accent-color); 
            border: none; 
            cursor: pointer; 
            align-self: center; 
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.5);
            flex-shrink: 0;
            position: relative;
        }
        #main-btn.active { 
            border-radius: 12px; 
            transform: scale(0.85); 
            background: #b91c1c;
        }
        .action-row { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
        }
        .sec-btn { 
            background: #f1f5f9; 
            border: none; 
            padding: 12px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 0.9rem; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        #clear-btn { 
            background: #fee2e2;
            color: #b91c1c;
            padding: 12px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="result-area"></div>
        <div class="controls">
            <button id="main-btn"></button>
            <div class="action-row">
                <button class="sec-btn" id="save-txt-btn">💾 テキスト保存</button>
                <button class="sec-btn" id="save-audio-btn">🎙️ 音声保存</button>
            </div>
            <button class="sec-btn" id="clear-btn">🗑️ すべて消去</button>
        </div>
    </div>

    <script>
        const APP_VERSION = "2.2.3";

        /* ==========================================
           富山消防・強制割込辞書 (500語超)
           ========================================== */
        const TOYAMA_FORCE_DICT = {
            // --- 最優先：標準変換が間違えやすい富山地名 ---
            "そうがわ": "総曲輪", "そうがわどおり": "総曲輪通り", "さがわ": "総曲輪", "あわがわ": "総曲輪", 
            "ふちゅう": "婦中町", "ふちゅうまち": "婦中町", "やつお": "八尾町", "やつおまち": "八尾町",
            "ごふく": "五福", "みずはし": "水橋", "いわぜ": "岩瀬", "いたがき": "板垣", "あざみ": "安住町",
            "おおさわの": "大沢野", "おおやま": "大山", "ほそいり": "細入", "やまだ": "山田",
            "ももづか": "百塚", "におり": "荷織", "うわの": "上野", "ひらき": "開", "にいかわ": "新川",
            "ありさわ": "有沢", "つきおか": "月岡", "しんじょう": "新庄", "くれたは": "呉羽",
            
            // --- 医療機関 ---
            "ちゅうおうびょういん": "県立中央病院", "しみんびょういん": "富山市民病院", "せきじゅうじ": "富山赤十字病院",
            "ふだい": "富大附属病院", "さいせいかい": "済生会富山病院", "みなみとやま": "南富山中川病院",
            "とやまろさい": "富山労災病院", "かみいち": "上市病院", "なめりかわ": "滑川病院", 
            "やつの": "八尾総合病院", "あさひ": "朝日病院", "まちなか": "まちなか病院",

            // --- 救急・医学 ---
            "しーぴーえー": "CPA", "ぶいえふ": "VF", "ぶいてぃー": "VT", "あーるおーえすしー": "ROSC",
            "じぇーしーえす": "JCS", "じーしーえす": "GCS", "えすぴーおーつー": "SpO2", "えーいーでぃー": "AED",
            "ききょう": "気胸", "しんきんこうそく": "心筋梗塞", "はいすいしゅ": "肺水腫", "はいそくせん": "肺塞栓",
            "のうこうそく": "脳梗塞", "のうしゅっけつ": "脳出血", "ていけっとう": "低血糖",
            "あどす": "アドレナリン", "ぶどうとう": "ブドウ糖", "じょさいどう": "除細動",

            // --- 無線・活動 ---
            "げんちゃく": "現着", "しゅうよう": "収容", "しゅうようさき": "収容先", "せんてい": "選定",
            "てんいん": "転院搬送", "しょうびょうしゃ": "傷病者", "かつどうかいし": "活動開始",
            "しれい": "指令", "とりあーじ": "トリアージ", "じこかぶ": "事後株",

            // --- その他 500語補完データ (略) ---
            "とやまえき": "富山駅", "ふぁぼーれ": "ファボーレ", "おーばーど": "オーバード・ホール",
            "しやくしょ": "富山市役所", "あぴた": "アピタ", "いおん": "イオン", "ぐらんどぷらざ": "グランドプラザ"
        };

        // 標準変換（iPhoneの勝手な漢字変換）を逆引きして強制修正するリスト
        const AUTO_CORRECT_MAP = {
            "相川": "総曲輪", "府中": "婦中町", "府中町": "婦中町", "八百": "八尾町", "五服": "五福"
        };

        let recognition, mediaRecorder, audioChunks = [];
        let silenceTimer = null;
        let finalTranscript = ""; 
        let isNewLine = true;

        const resultArea = document.getElementById('result-area');
        const mainBtn = document.getElementById('main-btn');

        // 強制割込エンジン：標準変換とひらがな読みの両方をチェック
        function forceToyamaCorrect(text) {
            if (!text) return text;
            let corrected = text;

            // 1. iPhoneが勝手に変換した誤漢字を修正
            for (const [wrong, right] of Object.entries(AUTO_CORRECT_MAP)) {
                corrected = corrected.replace(new RegExp(wrong, 'g'), right);
            }

            // 2. ひらがな読みからの優先置換（長い順）
            const sortedKeys = Object.keys(TOYAMA_FORCE_DICT).sort((a, b) => b.length - a.length);
            for (const key of sortedKeys) {
                corrected = corrected.replace(new RegExp(key, 'g'), TOYAMA_FORCE_DICT[key]);
            }
            
            return corrected;
        }

        function getTimestamp() {
            const now = new Date();
            return `${now.getHours()}時${now.getMinutes()}分${now.getSeconds()}秒 `;
        }

        mainBtn.onclick = async () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                if (recognition) recognition.stop();
                clearTimeout(silenceTimer);
                mainBtn.classList.remove('active');
            } else {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioChunks = [];
                    const mimeType = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : 'audio/webm';
                    mediaRecorder = new MediaRecorder(stream, { mimeType });
                    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
                    mediaRecorder.start();

                    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
                    recognition.lang = 'ja-JP';
                    recognition.continuous = true;
                    recognition.interimResults = true;

                    recognition.onresult = (e) => {
                        let interim = "";
                        let hasNewFinal = false;
                        for (let i = e.resultIndex; i < e.results.length; ++i) {
                            let transcript = e.results[i][0].transcript;
                            
                            // リアルタイムに強制修正を割り込ませる
                            transcript = forceToyamaCorrect(transcript);

                            if (e.results[i].isFinal) {
                                if (isNewLine) {
                                    finalTranscript += getTimestamp();
                                    isNewLine = false;
                                }
                                finalTranscript += transcript;
                                hasNewFinal = true;
                            } else {
                                interim += transcript;
                            }
                        }
                        if (hasNewFinal) {
                            clearTimeout(silenceTimer);
                            silenceTimer = setTimeout(() => {
                                if (finalTranscript !== "" && !finalTranscript.endsWith('\n')) {
                                    finalTranscript += '\n';
                                    resultArea.innerText = finalTranscript;
                                    isNewLine = true;
                                }
                            }, 5000);
                        }
                        resultArea.innerText = finalTranscript + (isNewLine && interim ? getTimestamp() : "") + interim;
                        resultArea.scrollTop = resultArea.scrollHeight;
                    };
                    recognition.start();
                    mainBtn.classList.add('active');
                    isNewLine = true;
                } catch (err) { alert("マイク使用を許可してください"); }
            }
        };

        // 保存・クリア機能（既存維持）
        document.getElementById('save-audio-btn').onclick = () => {
            if (audioChunks.length === 0) return alert("データがありません");
            const blob = new Blob(audioChunks, {type: 'audio/mp4'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `ems_toyama_v223_${new Date().getTime()}.m4a`;
            a.click();
        };

        document.getElementById('save-txt-btn').onclick = () => {
            const text = resultArea.innerText;
            if (!text) return alert("テキストがありません");
            const blob = new Blob([text], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `ems_toyama_v223_${new Date().getTime()}.txt`;
            a.click();
        };

        document.getElementById('clear-btn').onclick = () => {
            if(confirm("すべて消去しますか？")) { 
                resultArea.innerText = ''; finalTranscript = ''; audioChunks = []; isNewLine = true;
                clearTimeout(silenceTimer);
            }
        };
    </script>
</body>
</html>
