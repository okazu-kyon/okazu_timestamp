<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="icon.png">
    <title>REQ v2.2.8 (富山消防・救急記録サポーター)</title>
    <style>
        :root { 
            --bg-color: #ffffff; 
            --text-color: #1e293b; 
            --accent-color: #ef4444; 
            --border-color: #e2e8f0; 
        }
        body { 
            font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 16px; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            box-sizing: border-box;
            overflow: hidden;
            touch-action: manipulation;
        }
        /* ポップアップガイド */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        #guide-box {
            background: white;
            width: 85%;
            max-width: 400px;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        #guide-box h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: var(--accent-color);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }
        #guide-box ul {
            padding-left: 20px;
            font-size: 0.85rem;
            line-height: 1.6;
            margin: 15px 0;
        }
        #guide-box li { margin-bottom: 8px; }
        #close-guide {
            width: 100%;
            padding: 14px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }

        .container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            max-width: 500px; 
            margin: 0 auto; 
            width: 100%; 
            height: 100%;
        }
        #header-title {
            text-align: center;
            font-weight: 800;
            font-size: 1.2rem;
            margin: 0;
            color: var(--accent-color);
        }
        #result-area { 
            flex: 0 1 60%; 
            border: 2px solid var(--border-color); 
            border-radius: 20px; 
            padding: 15px; 
            overflow-y: auto; 
            white-space: pre-wrap; 
            font-size: 0.9rem; 
            line-height: 1.6;
            background: #fafafa;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 10px;
        }
        #main-btn { 
            width: 70px; 
            height: 70px; 
            border-radius: 50%; 
            background: var(--accent-color); 
            border: none; 
            cursor: pointer; 
            align-self: center; 
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.5);
            flex-shrink: 0;
        }
        #main-btn.active { 
            border-radius: 12px; 
            transform: scale(0.85); 
            background: #b91c1c;
        }
        .action-row { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
        }
        .sec-btn { 
            background: #f1f5f9; 
            border: none; 
            padding: 12px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 0.9rem; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        #clear-btn { 
            background: #fee2e2;
            color: #b91c1c;
            padding: 12px;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="guide-box">
            <h2>富山消防・救急記録サポーター REQ</h2>
            <ul>
                <li><strong>開始:</strong> 中央の赤ボタンで録音開始。再度押すと停止します。</li>
                <li><strong>富山辞書:</strong> 総曲輪、婦中、八尾などの地名や専門用語を自動変換します。</li>
                <li><strong>自動改行:</strong> 5秒間の沈黙を検知すると、時刻を挿入して自動で改行します。</li>
                <li><strong>データ保存:</strong> 終了後、必ず下のボタンからテキストや音声を保存してください。</li>
                <li><strong>機密保持:</strong> 取り扱う個人情報の管理には十分注意してください。</li>
            </ul>
            <button id="close-guide">了解して使用を開始する</button>
        </div>
    </div>

    <div class="container">
        <h1 id="header-title">REQ v2.2.8</h1>
        <div id="result-area"></div>
        <div class="controls">
            <button id="main-btn"></button>
            <div class="action-row">
                <button class="sec-btn" id="save-txt-btn">💾 テキスト保存</button>
                <button class="sec-btn" id="save-audio-btn">🎙️ 音声保存</button>
            </div>
            <button class="sec-btn" id="clear-btn">🗑️ すべて消去</button>
        </div>
    </div>

    <script>
        // ポップアップを閉じる
        document.getElementById('close-guide').onclick = () => {
            document.getElementById('overlay').style.display = 'none';
        };

        /* ==========================================
           REQ 強制割込辞書 (v2.2.8 ユーザー修正版継承)
           ========================================== */
        const TOYAMA_FORCE_DICT = {
            "そうがわ": "総曲輪", "さがわ": "総曲輪", "ふちゅう": "婦中町", "やつお": "八尾町",
            "ごふく": "五福", "みずはし": "水橋", "いわせ": "岩瀬", "いたがき": "板垣", "あざみ": "安住町",
            "おおさわの": "大沢野", "おおやま": "大山", "ほそいり": "細入", "やまだ": "山田",
            "ひゃくづか": "百塚", "におり": "荷織", "うわの": "上野", "ひらき": "開", "にいかわ": "新川",
            "ありさわ": "有沢", "つきおか": "月岡", "しんじょう": "新庄", "くれは": "呉羽",
            "たろうまる": "太郎丸", "ねづか": "根塚", "ぬのせ": "布瀬", "はね": "羽根", "いまいずみ": "今泉",
            "ほりかわ": "堀川", "やまむろ": "山室", "たかやしろ": "高屋敷", "にいかわ": "新川",
            "にながわ": "蜷川", "あかだ": "赤田", "おおしま": "大島", "おおまち": "大町",
            "かみだき": "上滝", "いのたに": "猪谷", "かにでら": "蟹寺", "あんようぼう": "安養寺",
            "しんぼ": "新保", "あきよし": "秋吉", "おおた": "太田", "はすまち": "蓮町", "こうよう": "光陽",
            "ふたくち": "二口", "たばたけ": "田畠", "にしのみや": "西宮", "おくだ": "奥田", "とよタ": "豊田",
            "ちゅうおうびょういん": "県立中央病院", "しみんびょういん": "富山市民病院", "せきじゅうじ": "富山赤十字病院",
            "とみだい": "富山大学附属病院", "さいせいかい": "済生会富山病院", 
            "とやまろうさい": "富山労災病院", "かみいちびょういん": "上市総合病院", "なめりかわ": "滑川病院", 
            "やつおそうごうびょういん": "八尾総合病院", "まちなか": "まちなか病院", 
            "とやまりはびり": "富山リハビリテーションセンター",
            "しーぴーえー": "CPA", "ぶいえふ": "VF", "ぶいてぃー": "VT", "ろすく": "ROSC",
            "じぇーしーえす": "JCS", "じーしーえす": "GCS", "えすぴーおーつー": "SpO2", "えーいーでぃー": "AED",
            "ききょう": "気胸", "しんきんこうそく": "心筋梗塞", "はいすいしゅ": "肺水腫", "はいそくせん": "肺塞栓",
            "のうこうそく": "脳梗塞", "のうしゅっけつ": "脳出血", "ていけっとう": "低血糖", "みゃくはく": "脈拍",
            "けつあつ": "血圧", "きゅうにゅう": "吸入", "とうよ": "投与", "あどれなりん": "アドレナリン",
            "ぶどうとう": "ブドウ糖", "じょさいどう": "除細動", "けいかん": "頸管", "あいじぇる": "i-gel",
            "びーびーえむ": "BBM", "るーと": "ルート確保", "さんそ": "酸素投与", "びーぶいえむ": "バックバルブマスク",
            "えあうぇい": "エアウェイ", "そんしょう": "損傷", "がいしょう": "外傷",
            "せいしん": "精神疾患", "しんふぜん": "心不全", "じんふぜん": "腎不全", "のうそっちゅう": "脳卒中",
            "あなふぃらきしー": "アナフィラキシー", "けいれん": "痙攣", "ぜんそく": "喘息", "でぃーおーえー": "DOA",
            "げんちゃく": "現着", "しゅうよう": "収容", "しゅうようさき": "収容先", "せんてい": "選定",
            "てんいん": "転院搬送", "しょうびょうしゃ": "傷病者", "かつどうかいし": "活動開始",
            "しれい": "指令", "とりあーじ": "トリアージ", "しゃないしゅうよう": "車内収容", "けいちょう": "聴取",
            "じょうきょう": "状況", "しんちょく": "進捗", "きょうりょく": "協力", "しゅつどう": "出動",
            "きしょ": "帰署", "じこ": "自己", "たしゃ": "他車", "じご": "事後", "えんじょ": "援助",
            "とやまえき": "富山駅", "ふぁぼーれ": "ファボーレ", "おーばーど": "オーバード・ホール",
            "しやくしょ": "富山市役所", "あぴた": "アピタ", "いおん": "イオン", "ぐらんどぷらざ": "グランドプラザ",
            "とやまくうこう": "富山空港", "しっく": "CIC", "けいさつ": "警察",
            "こうさてん": "交差点", "ばすてい": "バス停", "としょかん": "図書館", "ぎんこう": "銀行",
            "ゆうびんきょく": "郵便局", "こうじ": "工事", "じこ": "事故", "ひさい": "被災", "きんきゅう": "緊急",
            "ていし": "停止", "じどう": "自動", "しどう": "手動", "せんじょう": "洗浄", "しょうどく": "消毒",
            "ぼうご": "防護", "てぶくろ": "手袋", "ますく": "マスク", "ごーぐる": "ゴーグル", "がうん": "ガウン",
            "しーつ": "シーツ", "たんか": "担架", "くるまいす": "車椅子", "おくすり": "お薬手帳", "どうい": "同意書"
        };

        const AUTO_CORRECT_MAP = {
            "相川": "総曲輪", "早川": "総曲輪", "府中": "婦中町", "八百": "八尾町", "五服": "五福"
        };

        let recognition, mediaRecorder, audioChunks = [];
        let silenceTimer = null;
        let finalTranscript = ""; 
        let isNewLine = true;

        const resultArea = document.getElementById('result-area');
        const mainBtn = document.getElementById('main-btn');

        // ファイル名用タイムスタンプ生成 (YYYYMMDD_HHMMSS)
        function getFileTimestamp() {
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            return `${y}${m}${d}_${hh}${mm}${ss}`;
        }

        function forceToyamaCorrect(text) {
            if (!text) return text;
            let corrected = text;
            for (const [wrong, right] of Object.entries(AUTO_CORRECT_MAP)) {
                corrected = corrected.replace(new RegExp(wrong, 'g'), right);
            }
            const sortedKeys = Object.keys(TOYAMA_FORCE_DICT).sort((a, b) => b.length - a.length);
            for (const key of sortedKeys) {
                corrected = corrected.replace(new RegExp(key, 'g'), TOYAMA_FORCE_DICT[key]);
            }
            return corrected;
        }

        function getTimestamp() {
            const now = new Date();
            return `${now.getHours()}時${now.getMinutes()}分${now.getSeconds()}秒 `;
        }

        mainBtn.onclick = async () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop(); if (recognition) recognition.stop();
                clearTimeout(silenceTimer); mainBtn.classList.remove('active');
            } else {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioChunks = [];
                    const mimeType = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : 'audio/webm';
                    mediaRecorder = new MediaRecorder(stream, { mimeType });
                    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
                    mediaRecorder.start();

                    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
                    recognition.lang = 'ja-JP'; recognition.continuous = true; recognition.interimResults = true;

                    recognition.onresult = (e) => {
                        let interim = ""; let hasNewFinal = false;
                        for (let i = e.resultIndex; i < e.results.length; ++i) {
                            let transcript = forceToyamaCorrect(e.results[i][0].transcript);
                            if (e.results[i].isFinal) {
                                if (isNewLine) { finalTranscript += getTimestamp(); isNewLine = false; }
                                finalTranscript += transcript; hasNewFinal = true;
                            } else { interim += transcript; }
                        }
                        if (hasNewFinal) {
                            clearTimeout(silenceTimer);
                            silenceTimer = setTimeout(() => {
                                if (finalTranscript !== "" && !finalTranscript.endsWith('\n')) {
                                    finalTranscript += '\n'; resultArea.innerText = finalTranscript; isNewLine = true;
                                }
                            }, 5000);
                        }
                        resultArea.innerText = finalTranscript + (isNewLine && interim ? getTimestamp() : "") + interim;
                        resultArea.scrollTop = resultArea.scrollHeight;
                    };
                    recognition.start(); mainBtn.classList.add('active'); isNewLine = true;
                } catch (err) { alert("マイク使用を許可してください"); }
            }
        };

        document.getElementById('save-audio-btn').onclick = () => {
            if (audioChunks.length === 0) return alert("データがありません");
            const blob = new Blob(audioChunks, {type: 'audio/mp4'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `REQ_audio_${getFileTimestamp()}.m4a`; a.click();
        };

        document.getElementById('save-txt-btn').onclick = () => {
            const text = resultArea.innerText;
            if (!text) return alert("テキストがありません");
            const blob = new Blob([text], {type: 'text/plain'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `REQ_log_${getFileTimestamp()}.txt`; a.click();
        };

        document.getElementById('clear-btn').onclick = () => {
            if(confirm("すべて消去しますか？")) { 
                resultArea.innerText = ''; finalTranscript = ''; audioChunks = []; isNewLine = true;
                clearTimeout(silenceTimer);
            }
        };
    </script>
</body>
</html>
