<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音声・テキストレコーダー v1.8.6</title>
    <style>
        :root { --bg-color: #ffffff; --text-color: #1e293b; --accent-color: #ef4444; --border-color: #e2e8f0; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 16px; height: 100dvh; display: flex; flex-direction: column; }
        .container { flex: 1; display: flex; flex-direction: column; gap: 16px; max-width: 500px; margin: 0 auto; width: 100%; }
        #result-area { flex: 1; border: 1px solid var(--border-color); border-radius: 20px; padding: 16px; overflow-y: auto; white-space: pre-wrap; font-size: 1rem; }
        #main-btn { 
            width: 70px; height: 70px; border-radius: 50%; background: var(--accent-color); color: white; 
            border: none; cursor: pointer; align-self: center; margin-bottom: 10px; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }
        #main-btn.active { background: #b91c1c; transform: scale(0.95); }
        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .sec-btn { background: #f1f5f9; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <div id="result-area"></div>
        <button id="main-btn">●</button>
        <div class="action-row">
            <button class="sec-btn" id="save-txt-btn">💾 文保存</button>
            <button class="sec-btn" id="save-audio-btn">🎙️ 音保存(MP3)</button>
        </div>
        <button class="sec-btn" id="clear-btn" style="width:100%">🗑️ すべて消去</button>
    </div>
    <script>
        const APP_VERSION = "1.8.6";
        let recognition, mediaRecorder, audioChunks = [];
        const resultArea = document.getElementById('result-area');
        const mainBtn = document.getElementById('main-btn');

        mainBtn.onclick = async () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                recognition.stop();
                mainBtn.classList.remove('active');
            } else {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioChunks = [];
                // 録音開始
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };
                mediaRecorder.start();

                // 文字起こし開始
                recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
                recognition.lang = 'ja-JP';
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.onresult = (e) => resultArea.innerText = Array.from(e.results).map(r => r[0].transcript).join('');
                recognition.start();
                
                mainBtn.classList.add('active');
            }
        };

        document.getElementById('save-audio-btn').onclick = () => {
            if (audioChunks.length === 0) return alert("録音データが取得されていません。停止後に保存してください。");
            const blob = new Blob(audioChunks, {type: 'audio/webm'}); // 一旦ブラウザ対応形式で生成
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'recording_' + new Date().getTime() + '.mp3'; // 拡張子を強制
            a.click();
        };

        document.getElementById('save-txt-btn').onclick = () => {
            const blob = new Blob([resultArea.innerText], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'text.txt';
            a.click();
        };

        document.getElementById('clear-btn').onclick = () => {
            resultArea.innerText = '';
            audioChunks = [];
        };
    </script>
</body>
</html>
