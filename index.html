<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音声・テキストレコーダー v1.8.1</title>
    <style>
        :root { --bg-color: #ffffff; --text-color: #1e293b; --accent-color: #4f46e5; --border-color: #e2e8f0; --spacing-md: 16px; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: var(--spacing-md); height: 100dvh; display: flex; flex-direction: column; }
        .container { flex: 1; display: flex; flex-direction: column; gap: var(--spacing-md); max-width: 500px; margin: 0 auto; width: 100%; }
        #result-area { flex: 1; border: 1px solid var(--border-color); border-radius: 20px; padding: var(--spacing-md); overflow-y: auto; white-space: pre-wrap; font-size: 1rem; line-height: 1.6; }
        #main-btn { background: var(--accent-color); color: white; border: none; padding: 20px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        #main-btn.recording { background: #ef4444; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <div id="settings-panel">
            <div class="setting-row">
                <span>マイク感度(しきい値)</span>
                <input type="range" id="gain-slider" min="0" max="1" step="0.1" value="0.2">
            </div>
            <div class="setting-row">
                <span>無音で改行(秒)</span>
                <input type="range" id="threshold-slider" min="1" max="10" value="5">
            </div>
        </div>
        <div id="result-area"></div>
        <button id="main-btn">録音を開始</button>
    </div>
    <script>
        const APP_VERSION = "1.8.1";
        const resultArea = document.getElementById('result-area');
        const mainBtn = document.getElementById('main-btn');
        const gainSlider = document.getElementById('gain-slider');
        const thresholdSlider = document.getElementById('threshold-slider');

        let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'ja-JP';
        recognition.continuous = true;
        recognition.interimResults = true;

        let isRecording = false;
        let silenceTimer;

        // 無音改行ロジックの統合
        recognition.onresult = (event) => {
            clearTimeout(silenceTimer);
            let transcript = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
                transcript += event.results[i][0].transcript;
            }
            resultArea.innerText = transcript;

            silenceTimer = setTimeout(() => {
                resultArea.innerText += "\n";
            }, thresholdSlider.value * 1000);
        };

        mainBtn.onclick = () => {
            if (isRecording) {
                recognition.stop();
                mainBtn.innerText = "録音を開始";
                mainBtn.classList.remove('recording');
            } else {
                recognition.start();
                mainBtn.innerText = "録音を停止";
                mainBtn.classList.add('recording');
            }
            isRecording = !isRecording;
        };
    </script>
</body>
</html>
