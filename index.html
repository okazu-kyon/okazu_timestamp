<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voice Recorder v1.0.0</title>
    <style>
        /* Version: 1.0.0 */
        /* デザイン・レイアウトの固定 */
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --accent-color: #007aff;
            --stop-color: #ff3b30;
            --border-radius: 12px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100dvh;
            overflow: hidden;
        }

        h1 {
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 15px;
            color: var(--accent-color);
        }

        /* iOS ズーム防止策 */
        button {
            touch-action: manipulation;
            font-size: 16px;
            border: none;
            border-radius: var(--border-radius);
            padding: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.7;
        }

        #main-btn {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        #main-btn.recording {
            background-color: var(--stop-color);
        }

        #result-area {
            flex: 1;
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 15px;
            overflow-y: auto;
            margin-bottom: 15px;
            line-height: 1.6;
            font-size: 16px;
            white-space: pre-wrap;
            border: 1px solid #444;
        }

        .interim {
            color: #888;
        }

        .controls-bottom {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .secondary-btn {
            background-color: #444;
            color: white;
            font-size: 0.9rem;
        }

        #status-bar {
            font-size: 12px;
            text-align: center;
            margin-top: 8px;
            color: #666;
        }
    </style>
</head>
<body>

    <h1>Speech to Text v1.0.0</h1>

    <button id="main-btn">録音開始</button>

    <div id="result-area" id="output">ここに文字起こしが表示されます...</div>

    <div class="controls-bottom">
        <button id="copy-btn" class="secondary-btn">テキストをコピー</button>
        <button id="clear-btn" class="secondary-btn">消去</button>
    </div>

    <div id="status-bar">Status: Ready</div>

    <script>
        /**
         * 音響ロジック定義書（絶対変更禁止エリア）
         * 1. lang: 'ja-JP' (日本語認識)
         * 2. continuous: true (連続認識)
         * 3. interimResults: true (途中経過表示)
         */
        const recognitionConfig = {
            lang: 'ja-JP',
            continuous: true,
            interimResults: true
        };

        const mainBtn = document.getElementById('main-btn');
        const copyBtn = document.getElementById('copy-btn');
        const clearBtn = document.getElementById('clear-btn');
        const resultArea = document.getElementById('result-area');
        const statusBar = document.getElementById('status-bar');

        let recognition = null;
        let isRecording = false;
        let finalTranscript = '';

        // Web Speech API の初期化 (Safari/Chrome互換)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            resultArea.innerText = "お使いのブラウザは音声認識に対応していません。iOS SafariまたはChromeをお試しください。";
            mainBtn.disabled = true;
        } else {
            recognition = new SpeechRecognition();
            Object.assign(recognition, recognitionConfig);
        }

        // 音声認識のイベント制御
        if (recognition) {
            recognition.onstart = () => {
                console.log("Speech recognition started");
                updateStatus("認識中...");
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript + '\n';
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                renderText(interimTranscript);
            };

            recognition.onerror = (event) => {
                console.error("Speech Recognition Error:", event.error);
                updateStatus(`Error: ${event.error}`);
                
                // 404やネットワークエラー時の具体的なログ
                if (event.error === 'not-allowed') {
                    alert("マイクの使用が許可されていません。設定を確認してください。");
                }
            };

            recognition.onend = () => {
                console.log("Speech recognition ended");
                // 意図しない終了（沈黙など）の場合に再起動する堅牢性ロジック
                if (isRecording) {
                    console.log("Restarting recognition...");
                    recognition.start();
                } else {
                    updateStatus("停止中");
                }
            };
        }

        // ボタン操作
        mainBtn.addEventListener('click', () => {
            if (!isRecording) {
                startRecording();
            } else {
                stopRecording();
            }
        });

        clearBtn.addEventListener('click', () => {
            if (confirm("テキストを消去しますか？")) {
                finalTranscript = '';
                resultArea.innerHTML = '';
                updateStatus("消去完了");
            }
        });

        copyBtn.addEventListener('click', () => {
            const text = resultArea.innerText;
            navigator.clipboard.writeText(text).then(() => {
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "コピー完了！";
                setTimeout(() => copyBtn.innerText = originalText, 2000);
            }).catch(err => {
                console.error("Copy failed:", err);
            });
        });

        function startRecording() {
            isRecording = true;
            mainBtn.innerText = "録音停止";
            mainBtn.classList.add('recording');
            try {
                recognition.start();
            } catch (e) {
                console.error("Recognition start error:", e);
            }
        }

        function stopRecording() {
            isRecording = false;
            mainBtn.innerText = "録音開始";
            mainBtn.classList.remove('recording');
            recognition.stop();
        }

        function renderText(interim) {
            resultArea.innerHTML = finalTranscript + '<span class="interim">' + interim + '</span>';
            // 自動スクロール
            resultArea.scrollTop = resultArea.scrollHeight;
        }

        function updateStatus(msg) {
            statusBar.innerText = `Status: ${msg}`;
        }
    </script>
</body>
</html>
