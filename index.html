<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>High-Response Recorder v1.2.0</title>
    <style>
        /* Version: 1.2.0 */
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --accent-color: #007aff;
            --active-color: #34c759;
            --stop-color: #ff3b30;
            --timestamp-color: #5ac8fa;
            --border-radius: 12px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column;
            height: 100dvh; overflow: hidden;
        }

        /* 音量インジケーター */
        #meter-container {
            width: 100%; height: 6px;
            background: #444; border-radius: 3px;
            margin-bottom: 10px; overflow: hidden;
        }
        #meter-bar {
            width: 0%; height: 100%;
            background: var(--active-color);
            transition: width 0.1s ease-out;
        }

        #diag-panel {
            background: #000; padding: 10px; border-radius: 8px;
            font-family: monospace; font-size: 11px; margin-bottom: 10px;
            border: 1px solid #444; display: grid; grid-template-columns: 1fr 1fr; gap: 5px;
        }

        #main-btn {
            touch-action: manipulation; width: 100%;
            background-color: var(--accent-color); color: white;
            border: none; border-radius: var(--border-radius);
            padding: 18px; font-size: 1.1rem; font-weight: bold; margin-bottom: 10px;
        }

        #main-btn.recording { background-color: var(--stop-color); }

        #result-area {
            flex: 1; background-color: var(--card-bg); border-radius: var(--border-radius);
            padding: 15px; overflow-y: auto; margin-bottom: 15px;
            font-size: 16px; line-height: 1.8; white-space: pre-wrap; border: 1px solid #444;
        }

        .timestamp { color: var(--timestamp-color); font-weight: bold; font-size: 0.85em; margin-right: 8px; }
        .interim { color: var(--active-color); opacity: 0.8; font-style: italic; }

        .bottom-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .sec-btn {
            touch-action: manipulation; background: #444; color: white;
            border: none; padding: 12px; border-radius: 8px; font-weight: bold;
        }

        #error-display { color: var(--stop-color); font-size: 11px; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="meter-container"><div id="meter-bar"></div></div>

    <div id="diag-panel">
        <div class="diag-item">State: <span id="diag-state" style="color:var(--active-color)">idle</span></div>
        <div class="diag-item">Mic: <span id="diag-mic">waiting</span></div>
    </div>

    <button id="main-btn">録音開始 (High-Response)</button>

    <div id="result-area"></div>

    <div class="bottom-btns">
        <button id="copy-btn" class="sec-btn">コピー</button>
        <button id="clear-btn" class="sec-btn">消去</button>
    </div>

    <div id="error-display"></div>

    <script>
        /**
         * 音響ロジック定義書 v1.2.0
         * 1. continuous: false (iOS高速ループ)
         * 2. RESTART_DELAY: 200ms (レスポンス向上)
         * 3. BLANK_THRESHOLD: 5000ms (5秒無音でスタンプ更新)
         * 4. maxAlternatives: 1
         */
        const config = { lang: 'ja-JP', continuous: false, interimResults: true, maxAlternatives: 1 };
        const BLANK_THRESHOLD = 5000;
        const RESTART_DELAY = 200;
        
        const mainBtn = document.getElementById('main-btn');
        const resultArea = document.getElementById('result-area');
        const meterBar = document.getElementById('meter-bar');
        const dState = document.getElementById('diag-state');
        const dMic = document.getElementById('diag-mic');

        let isRecording = false;
        let recognition = null;
        let audioContext = null;
        let analyser = null;
        let dataArray = null;
        
        let lastSpeechTime = 0;
        let fullLogHTML = '';

        window.onload = () => {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (Speech) {
                recognition = new Speech();
                Object.assign(recognition, config);
                setupRecognitionEvents();
            }
        };

        function getTimestamp() {
            const now = new Date();
            return `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}]`;
        }

        // 音量メーターの更新
        function updateMeter() {
            if (!isRecording) {
                meterBar.style.width = '0%';
                return;
            }
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
            let average = sum / dataArray.length;
            let level = Math.min(average * 2, 100); // 感度調整用
            meterBar.style.width = level + '%';
            requestAnimationFrame(updateMeter);
        }

        async function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                dMic.innerText = "Active";
                dMic.style.color = "var(--active-color)";
            }
            if (audioContext.state === 'suspended') await audioContext.resume();
        }

        function setupRecognitionEvents() {
            recognition.onstart = () => { dState.innerText = 'recognizing'; };
            
            recognition.onresult = (event) => {
                let interim = '';
                const now = Date.now();

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        if (now - lastSpeechTime > BLANK_THRESHOLD) {
                            fullLogHTML += (fullLogHTML ? '\n' : '') + `<span class="timestamp">${getTimestamp()}</span>`;
                        }
                        fullLogHTML += transcript + ' ';
                        lastSpeechTime = now;
                    } else {
                        interim += transcript;
                    }
                }
                resultArea.innerHTML = fullLogHTML + (interim ? `<span class="interim">${interim}</span>` : '');
                resultArea.scrollTop = resultArea.scrollHeight;
            };

            recognition.onend = () => {
                dState.innerText = 'idle';
                if (isRecording) {
                    setTimeout(() => {
                        if (isRecording) {
                            try { recognition.start(); dState.innerText = 'restarting'; } catch(err) {}
                        }
                    }, RESTART_DELAY);
                }
            };

            recognition.onerror = (e) => {
                document.getElementById('error-display').innerText = "Error: " + e.error;
            };
        }

        mainBtn.addEventListener('click', async () => {
            if (!isRecording) {
                try {
                    await initAudio();
                    isRecording = true;
                    if (!fullLogHTML) {
                        fullLogHTML = `<span class="timestamp">${getTimestamp()}</span>`;
                        lastSpeechTime = Date.now();
                    }
                    mainBtn.innerText = "録音停止";
                    mainBtn.classList.add('recording');
                    recognition.start();
                    updateMeter();
                } catch (err) {
                    alert("マイクへのアクセスを許可してください");
                }
            } else {
                isRecording = false;
                mainBtn.innerText = "録音開始 (High-Response)";
                mainBtn.classList.remove('recording');
                recognition.stop();
            }
        });

        document.getElementById('copy-btn').addEventListener('click', () => {
            navigator.clipboard.writeText(resultArea.innerText).then(() => alert("コピーしました"));
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            if(confirm("消去しますか？")) {
                fullLogHTML = '';
                resultArea.innerHTML = '';
                lastSpeechTime = 0;
            }
        });
    </script>
</body>
</html>
