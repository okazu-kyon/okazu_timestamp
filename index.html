<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Log Recorder v1.1.0</title>
    <style>
        /* Version: 1.1.0 */
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --accent-color: #007aff;
            --active-color: #34c759;
            --stop-color: #ff3b30;
            --warning-color: #ff9500;
            --timestamp-color: #5ac8fa;
            --border-radius: 12px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column;
            height: 100dvh; overflow: hidden;
        }

        #https-warning {
            display: none;
            background-color: var(--warning-color);
            color: black;
            padding: 10px; border-radius: var(--border-radius);
            font-weight: bold; margin-bottom: 10px; text-align: center; font-size: 14px;
        }

        #diag-panel {
            background: #000; padding: 10px; border-radius: 8px;
            font-family: monospace; font-size: 11px; margin-bottom: 10px;
            border: 1px solid #444; display: grid; grid-template-columns: 1fr 1fr; gap: 5px;
        }

        .diag-item span { color: var(--active-color); }

        #main-btn {
            touch-action: manipulation; width: 100%;
            background-color: var(--accent-color); color: white;
            border: none; border-radius: var(--border-radius);
            padding: 20px; font-size: 1.2rem; font-weight: bold; margin-bottom: 15px;
        }

        #main-btn.recording { background-color: var(--stop-color); }

        #result-area {
            flex: 1; background-color: var(--card-bg); border-radius: var(--border-radius);
            padding: 15px; overflow-y: auto; margin-bottom: 15px;
            font-size: 16px; line-height: 1.8; white-space: pre-wrap; border: 1px solid #444;
        }

        .timestamp {
            color: var(--timestamp-color);
            font-weight: bold;
            font-size: 0.85em;
            margin-right: 8px;
        }

        .interim { color: var(--active-color); opacity: 0.7; font-style: italic; }

        .bottom-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .sec-btn {
            touch-action: manipulation; background: #444; color: white;
            border: none; padding: 12px; border-radius: 8px; font-weight: bold;
        }

        #error-display { color: var(--stop-color); font-size: 12px; text-align: center; margin-top: 5px; min-height: 15px; }
    </style>
</head>
<body>

    <div id="https-warning">⚠️ HTTPS接続が必要です</div>

    <div id="diag-panel">
        <div class="diag-item">State: <span id="diag-state">idle</span></div>
        <div class="diag-item">Event: <span id="diag-event">none</span></div>
    </div>

    <button id="main-btn">録音開始</button>

    <div id="result-area"></div>

    <div class="bottom-btns">
        <button id="copy-btn" class="sec-btn">コピー</button>
        <button id="clear-btn" class="sec-btn">消去</button>
    </div>

    <div id="error-display"></div>

    <script>
        /**
         * 音響ロジック定義書 v1.1.0
         * 1. continuous: false (iOS再起動ループ採用)
         * 2. BLANK_THRESHOLD: 10000ms (10秒の無音で改行)
         */
        const config = { lang: 'ja-JP', continuous: false, interimResults: true };
        const BLANK_THRESHOLD = 10000; 
        
        const mainBtn = document.getElementById('main-btn');
        const resultArea = document.getElementById('result-area');
        const errorDisplay = document.getElementById('error-display');
        const dState = document.getElementById('diag-state');
        const dEvent = document.getElementById('diag-event');

        let isRecording = false;
        let recognition = null;
        let audioContext = null;
        
        let lastSpeechTime = 0; // 最後に音声を検知した時刻
        let fullLogHTML = '';   // 確定したHTMLログを保持

        window.onload = () => {
            if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
                document.getElementById('https-warning').style.display = 'block';
            }
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (Speech) {
                recognition = new Speech();
                Object.assign(recognition, config);
                setupRecognitionEvents();
            } else {
                errorDisplay.innerText = "Speech API 未対応です";
            }
        };

        function getTimestamp() {
            const now = new Date();
            return `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}]`;
        }

        function setupRecognitionEvents() {
            recognition.onstart = () => updateDiag('recognizing', 'onstart');
            
            recognition.onresult = (event) => {
                updateDiag('recognizing', 'onresult');
                let interim = '';
                const now = Date.now();

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    const transcript = event.results[i][0].transcript;
                    
                    if (event.results[i].isFinal) {
                        // 10秒以上のブランク判定
                        if (now - lastSpeechTime > BLANK_THRESHOLD) {
                            fullLogHTML += (fullLogHTML ? '\n' : '') + `<span class="timestamp">${getTimestamp()}</span>`;
                        }
                        fullLogHTML += transcript + ' ';
                        lastSpeechTime = now;
                    } else {
                        interim += transcript;
                    }
                }
                
                // 描画更新
                resultArea.innerHTML = fullLogHTML + (interim ? `<span class="interim">${interim}</span>` : '');
                resultArea.scrollTop = resultArea.scrollHeight;
            };

            recognition.onerror = (e) => {
                updateDiag('error', 'onerror: ' + e.error);
                errorDisplay.innerText = "Error: " + e.error;
            };

            recognition.onend = () => {
                updateDiag('idle', 'onend');
                if (isRecording) {
                    setTimeout(() => {
                        if (isRecording) {
                            try { recognition.start(); } catch(err) { console.error(err); }
                        }
                    }, 400); 
                }
            };
        }

        mainBtn.addEventListener('click', async () => {
            if (!isRecording) {
                if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
                if (audioContext.state === 'suspended') await audioContext.resume();

                isRecording = true;
                // 開始時に一度タイムスタンプを強制セット（初回用）
                if (!fullLogHTML) {
                    fullLogHTML = `<span class="timestamp">${getTimestamp()}</span>`;
                    lastSpeechTime = Date.now();
                }

                mainBtn.innerText = "録音停止";
                mainBtn.classList.add('recording');
                errorDisplay.innerText = "";
                recognition.start();
            } else {
                isRecording = false;
                mainBtn.innerText = "録音開始";
                mainBtn.classList.remove('recording');
                recognition.stop();
            }
        });

        function updateDiag(state, event) {
            dState.innerText = state;
            dEvent.innerText = event;
        }

        document.getElementById('copy-btn').addEventListener('click', () => {
            // タグを除去してテキストのみコピー
            const plainText = resultArea.innerText;
            navigator.clipboard.writeText(plainText).then(() => alert("コピーしました"));
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            if(confirm("消去しますか？")) {
                fullLogHTML = '';
                resultArea.innerHTML = '';
                lastSpeechTime = 0;
            }
        });
    </script>
</body>
</html>
