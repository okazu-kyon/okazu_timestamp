<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Recorder v1.8.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); --accent-color: #0ea5e9;
            --active-color: #10b981; --stop-color: #ef4444; --text-color: #f8fafc;
            --text-muted: #94a3b8; --timestamp-color: #38bdf8;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 12px; height: 100dvh; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; height: 100%; gap: 10px; }
        #meter-container { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.05); border-radius: 3px; overflow: hidden; }
        #meter-bar { width: 0%; height: 100%; background: linear-gradient(90deg, var(--active-color), #34d399); transition: width 0.1s ease-out; }
        #diag-panel { background: rgba(0, 0, 0, 0.3); padding: 6px 12px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 10px; display: flex; justify-content: space-between; color: var(--text-muted); border: 1px solid rgba(255, 255, 255, 0.05); }
        #main-btn { touch-action: manipulation; width: 100%; background: var(--accent-color); color: white; border: none; border-radius: 14px; padding: 14px; font-size: 1rem; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px; }
        #main-btn.recording { background: var(--stop-color); }
        #result-area { flex: 1; background: var(--card-bg); border-radius: 14px; padding: 20px; overflow-y: auto; font-size: 18px; line-height: 1.6; white-space: pre-wrap; border: 1px solid rgba(255, 255, 255, 0.1); }
        .timestamp { color: var(--timestamp-color); font-family: 'JetBrains Mono', monospace; font-size: 0.85em; background: rgba(56, 189, 248, 0.1); padding: 1px 4px; border-radius: 3px; margin-right: 8px; }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(255, 255, 255, 0.03); padding: 10px; border-radius: 12px; }
        .sec-btn { background: rgba(255, 255, 255, 0.05); color: white; border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 12px; font-weight: 600; }
    </style>
</head>

<body>
    <div class="container">
        <div id="meter-container"><div id="meter-bar"></div></div>
        <div id="diag-panel">
            <div>状態: <span id="diag-state">待機中</span></div>
            <div>学習値: <span id="noise-floor">--</span></div>
        </div>
        <button id="main-btn"><span id="btn-text">録音・文字起こしを開始</span></button>
        <div id="result-area"></div>
        <div class="settings-grid">
            <div>感度: <input type="range" id="gain-slider" min="1" max="10" step="0.5" value="2.5"></div>
            <div>改行: <input type="range" id="threshold-slider" min="1" max="15" step="1" value="5"></div>
        </div>
        <div class="bottom-btns" style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;">
            <button id="copy-btn" class="sec-btn">コピー</button>
            <button id="save-btn" class="sec-btn" style="background:var(--active-color)">保存</button>
            <button id="clear-btn" class="sec-btn">消去</button>
        </div>
    </div>

    <script>
        let isRecording = false, noiseFloor = 0, audioContext, analyser, dataArray, mediaRecorder, audioChunks = [];
        let fullLogHTML = '', lastSpeechTime = 0;
        
        async function initAudio() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            audioContext.createMediaStreamSource(stream).connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        }

        async function startCalibration() {
            document.getElementById('diag-state').innerText = "学習中...静かにして";
            let sum = 0, count = 0;
            const learn = setInterval(() => {
                analyser.getByteFrequencyData(dataArray);
                sum += dataArray.reduce((a,b) => a+b) / dataArray.length;
                count++;
            }, 100);
            
            return new Promise(resolve => setTimeout(() => {
                clearInterval(learn);
                noiseFloor = sum / count;
                document.getElementById('noise-floor').innerText = noiseFloor.toFixed(1);
                document.getElementById('diag-state').innerText = "認識中";
                resolve();
            }, 3000));
        }

        document.getElementById('main-btn').onclick = async () => {
            if(!isRecording) {
                await initAudio();
                await startCalibration();
                isRecording = true;
                mediaRecorder.start();
                updateMeter();
            } else { location.reload(); }
        };

        function updateMeter() {
            if(!isRecording) return;
            analyser.getByteFrequencyData(dataArray);
            let avg = dataArray.reduce((a,b) => a+b) / dataArray.length;
            // ノイズ除去ロジック (avg - noiseFloor)
            let val = Math.max(0, (avg - noiseFloor)) * parseFloat(document.getElementById('gain-slider').value);
            document.getElementById('meter-bar').style.width = Math.min(val, 100) + '%';
            requestAnimationFrame(updateMeter);
        }
        
        // 保存・コピー・消去などの既存ロジックは略 (v1.7.0を維持)
    </script>
</body>
</html>
