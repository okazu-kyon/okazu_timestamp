<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voice & Text Recorder v1.3.0</title>
    <style>
        /* Version: 1.3.0 */
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --accent-color: #007aff;
            --active-color: #34c759;
            --stop-color: #ff3b30;
            --timestamp-color: #5ac8fa;
            --border-radius: 12px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column;
            height: 100dvh; overflow: hidden;
        }

        /* 音量インジケーター */
        #meter-container {
            width: 100%; height: 6px;
            background: #444; border-radius: 3px;
            margin-bottom: 8px; overflow: hidden;
        }
        #meter-bar {
            width: 0%; height: 100%;
            background: var(--active-color);
            transition: width 0.1s ease-out;
        }

        #diag-panel {
            background: #000; padding: 10px; border-radius: 8px;
            font-family: monospace; font-size: 11px; margin-bottom: 10px;
            border: 1px solid #444; display: grid; grid-template-columns: 1fr 1fr; gap: 5px;
        }

        #main-btn {
            touch-action: manipulation; width: 100%;
            background-color: var(--accent-color); color: white;
            border: none; border-radius: var(--border-radius);
            padding: 18px; font-size: 1.1rem; font-weight: bold; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        #main-btn.recording { background-color: var(--stop-color); }

        /* 録音中ドット */
        #rec-dot {
            width: 12px; height: 12px; background: white; border-radius: 50%;
            display: none;
        }
        #main-btn.recording #rec-dot {
            display: inline-block;
            animation: blink 1s infinite;
            background: white;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        #result-area {
            flex: 1; background-color: var(--card-bg); border-radius: var(--border-radius);
            padding: 15px; overflow-y: auto; margin-bottom: 15px;
            font-size: 16px; line-height: 1.8; white-space: pre-wrap; border: 1px solid #444;
        }

        .timestamp { color: var(--timestamp-color); font-weight: bold; font-size: 0.85em; margin-right: 8px; }
        .interim { color: var(--active-color); opacity: 0.8; font-style: italic; }

        .bottom-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .sec-btn {
            touch-action: manipulation; background: #444; color: white;
            border: none; padding: 12px 5px; border-radius: 8px; font-weight: bold; font-size: 0.8rem;
        }
        .save-btn { background-color: var(--active-color); color: white; }

        #error-display { color: var(--stop-color); font-size: 11px; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="meter-container"><div id="meter-bar"></div></div>

    <div id="diag-panel">
        <div class="diag-item">State: <span id="diag-state">idle</span></div>
        <div class="diag-item">AudioRec: <span id="diag-rec">off</span></div>
    </div>

    <button id="main-btn">
        <span id="rec-dot"></span>
        <span id="btn-text">録音・解析開始</span>
    </button>

    <div id="result-area"></div>

    <div class="bottom-btns">
        <button id="copy-btn" class="sec-btn">コピー</button>
        <button id="save-btn" class="sec-btn save-btn">保存</button>
        <button id="clear-btn" class="sec-btn">消去</button>
    </div>

    <div id="error-display"></div>

    <script>
        /**
         * 音響ロジック定義書 v1.3.0
         * 1. Speech Recognition: continuous: false (iOS互換ループ)
         * 2. Audio Recording: MediaRecorder API (Safari互換形式)
         * 3. Download: Blob URL + a[download]
         */
        const config = { lang: 'ja-JP', continuous: false, interimResults: true, maxAlternatives: 1 };
        const BLANK_THRESHOLD = 5000;
        const RESTART_DELAY = 200;
        
        const mainBtn = document.getElementById('main-btn');
        const btnText = document.getElementById('btn-text');
        const resultArea = document.getElementById('result-area');
        const meterBar = document.getElementById('meter-bar');
        const dState = document.getElementById('diag-state');
        const dRec = document.getElementById('diag-rec');

        let isRecording = false;
        let recognition = null;
        let audioContext = null;
        let analyser = null;
        let dataArray = null;
        
        // 録音用
        let mediaRecorder = null;
        let audioChunks = [];
        let audioBlob = null;
        
        let lastSpeechTime = 0;
        let fullLogHTML = '';

        window.onload = () => {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (Speech) {
                recognition = new Speech();
                Object.assign(recognition, config);
                setupRecognitionEvents();
            }
        };

        function getTimestamp(forFileName = false) {
            const now = new Date();
            const pad = (n) => n.toString().padStart(2, '0');
            if (forFileName) {
                return `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
            }
            return `[${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}]`;
        }

        function updateMeter() {
            if (!isRecording) { meterBar.style.width = '0%'; return; }
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
            let average = sum / dataArray.length;
            meterBar.style.width = Math.min(average * 2, 100) + '%';
            requestAnimationFrame(updateMeter);
        }

        async function initAudioAndRecorder() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // 録音機の設定
                const options = { mimeType: 'audio/webm' };
                // Safari用フォールバック
                if (!MediaRecorder.isTypeSupported('audio/webm')) {
                    options.mimeType = 'audio/mp4';
                }
                
                mediaRecorder = new MediaRecorder(stream, options);
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };
                mediaRecorder.onstop = () => {
                    audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
                    dRec.innerText = "Ready to Save";
                };

                const source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }
            if (audioContext.state === 'suspended') await audioContext.resume();
        }

        function setupRecognitionEvents() {
            recognition.onstart = () => { dState.innerText = 'recognizing'; };
            recognition.onresult = (event) => {
                let interim = '';
                const now = Date.now();
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        if (now - lastSpeechTime > BLANK_THRESHOLD) {
                            fullLogHTML += (fullLogHTML ? '\n' : '') + `<span class="timestamp">${getTimestamp()}</span>`;
                        }
                        fullLogHTML += transcript + ' ';
                        lastSpeechTime = now;
                    } else {
                        interim += transcript;
                    }
                }
                resultArea.innerHTML = fullLogHTML + (interim ? `<span class="interim">${interim}</span>` : '');
                resultArea.scrollTop = resultArea.scrollHeight;
            };
            recognition.onend = () => {
                if (isRecording) {
                    setTimeout(() => { if (isRecording) try { recognition.start(); } catch(e){} }, RESTART_DELAY);
                } else { dState.innerText = 'idle'; }
            };
        }

        mainBtn.addEventListener('click', async () => {
            if (!isRecording) {
                try {
                    await initAudioAndRecorder();
                    audioChunks = [];
                    audioBlob = null;
                    isRecording = true;
                    if (!fullLogHTML) {
                        fullLogHTML = `<span class="timestamp">${getTimestamp()}</span>`;
                        lastSpeechTime = Date.now();
                    }
                    btnText.innerText = "録音・解析停止";
                    mainBtn.classList.add('recording');
                    recognition.start();
                    mediaRecorder.start();
                    dRec.innerText = "Recording...";
                    updateMeter();
                } catch (err) { alert("マイク使用を許可してください"); }
            } else {
                isRecording = false;
                btnText.innerText = "録音・解析開始";
                mainBtn.classList.remove('recording');
                recognition.stop();
                mediaRecorder.stop();
            }
        });

        document.getElementById('save-btn').addEventListener('click', () => {
            if (!fullLogHTML && !audioBlob) { alert("保存するデータがありません"); return; }
            
            const fileNameBase = getTimestamp(true);
            
            // 1. テキスト保存
            const textBlob = new Blob([resultArea.innerText], { type: 'text/plain' });
            downloadFile(textBlob, `log_${fileNameBase}.txt`);

            // 2. 音声保存 (録音停止直後だとBlob生成が間に合わない場合があるためチェック)
            if (audioBlob) {
                const ext = mediaRecorder.mimeType.includes('webm') ? 'webm' : 'm4a';
                downloadFile(audioBlob, `audio_${fileNameBase}.${ext}`);
            } else {
                alert("音声データの準備中です。数秒待ってから再度保存してください。");
            }
        });

        function downloadFile(blob, name) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = name;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
        }

        document.getElementById('copy-btn').addEventListener('click', () => {
            navigator.clipboard.writeText(resultArea.innerText).then(() => alert("コピーしました"));
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            if(confirm("データを消去しますか？（保存していないデータは消えます）")) {
                fullLogHTML = '';
                resultArea.innerHTML = '';
                audioChunks = [];
                audioBlob = null;
                dRec.innerText = "Cleared";
            }
        });
    </script>
</body>
</html>
