<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voice Recorder v1.0.2</title>
    <style>
        /* Version: 1.0.2 */
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --accent-color: #007aff;
            --active-color: #34c759;
            --stop-color: #ff3b30;
            --warning-color: #ff9500;
            --border-radius: 12px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column;
            height: 100dvh; overflow: hidden;
        }

        /* HTTPS 警告 */
        #https-warning {
            display: none;
            background-color: var(--warning-color);
            color: black;
            padding: 10px;
            border-radius: var(--border-radius);
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 14px;
            text-align: center;
        }

        /* 診断パネル */
        #diag-panel {
            background: #000;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 11px;
            margin-bottom: 10px;
            border: 1px solid #444;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }

        .diag-item span { color: var(--active-color); }

        #main-btn {
            touch-action: manipulation;
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        #main-btn.recording { background-color: var(--stop-color); }

        #result-area {
            flex: 1;
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 15px;
            overflow-y: auto;
            margin-bottom: 15px;
            font-size: 16px;
            line-height: 1.6;
            white-space: pre-wrap;
            border: 1px solid #444;
        }

        .interim { color: var(--active-color); opacity: 0.8; }

        .bottom-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .sec-btn {
            touch-action: manipulation;
            background: #444; color: white; border: none;
            padding: 12px; border-radius: 8px; font-weight: bold;
        }

        #error-display {
            color: var(--stop-color);
            font-size: 12px;
            text-align: center;
            margin-top: 5px;
            min-height: 15px;
        }
    </style>
</head>
<body>

    <div id="https-warning">⚠️ HTTPS接続が必要です（マイクが動作しません）</div>

    <div id="diag-panel">
        <div class="diag-item">API: <span id="diag-api">-</span></div>
        <div class="diag-item">State: <span id="diag-state">idle</span></div>
        <div class="diag-item">Event: <span id="diag-event">none</span></div>
        <div class="diag-item">HTTPS: <span id="diag-https">-</span></div>
    </div>

    <button id="main-btn">録音開始</button>

    <div id="result-area" placeholder="ここにテキストが表示されます"></div>

    <div class="bottom-btns">
        <button id="copy-btn" class="sec-btn">コピー</button>
        <button id="clear-btn" class="sec-btn">消去</button>
    </div>

    <div id="error-display"></div>

    <script>
        /**
         * 音響ロジック定義書 v1.0.2
         * iOS Safariの制限を回避するため continuous: false + 手動ディレイループを採用
         */
        const config = { lang: 'ja-JP', continuous: false, interimResults: true };
        
        const mainBtn = document.getElementById('main-btn');
        const resultArea = document.getElementById('result-area');
        const errorDisplay = document.getElementById('error-display');
        
        // 診断用要素
        const dApi = document.getElementById('diag-api');
        const dState = document.getElementById('diag-state');
        const dEvent = document.getElementById('diag-event');
        const dHttps = document.getElementById('diag-https');

        let isRecording = false;
        let finalTranscript = '';
        let recognition = null;
        let audioContext = null;

        // 1. 初期チェック
        window.onload = () => {
            const isHttps = location.protocol === 'https:' || location.hostname === 'localhost';
            dHttps.innerText = isHttps ? "OK" : "NG";
            if (!isHttps) document.getElementById('https-warning').style.display = 'block';

            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (Speech) {
                dApi.innerText = "OK";
                recognition = new Speech();
                Object.assign(recognition, config);
                setupRecognitionEvents();
            } else {
                dApi.innerText = "NG";
                errorDisplay.innerText = "Speech API 未対応のブラウザです";
            }
        };

        function setupRecognitionEvents() {
            recognition.onstart = () => updateDiag('recognizing', 'onstart');
            
            recognition.onresult = (event) => {
                updateDiag('recognizing', 'onresult');
                let interim = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    const text = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += text + '。';
                    } else {
                        interim += text;
                    }
                }
                resultArea.innerHTML = finalTranscript + '<span class="interim">' + interim + '</span>';
                resultArea.scrollTop = resultArea.scrollHeight;
            };

            recognition.onerror = (e) => {
                updateDiag('error', 'onerror: ' + e.error);
                errorDisplay.innerText = "Error: " + e.error;
            };

            recognition.onend = () => {
                updateDiag('idle', 'onend');
                // 再起動ループ (iOS対策のディレイ)
                if (isRecording) {
                    updateDiag('restarting', 'waiting...');
                    setTimeout(() => {
                        if (isRecording) {
                            try { recognition.start(); } catch(err) { console.error(err); }
                        }
                    }, 400); 
                }
            };
        }

        // 2. 権限トリガー
        mainBtn.addEventListener('click', async () => {
            if (!isRecording) {
                // AudioContextを生成してiOSのオーディオをアクティブにする
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                isRecording = true;
                mainBtn.innerText = "録音停止";
                mainBtn.classList.add('recording');
                errorDisplay.innerText = "";
                try {
                    recognition.start();
                } catch (e) {
                    updateDiag('error', 'start-failed');
                }
            } else {
                isRecording = false;
                mainBtn.innerText = "録音開始";
                mainBtn.classList.remove('recording');
                recognition.stop();
            }
        });

        function updateDiag(state, event) {
            dState.innerText = state;
            dEvent.innerText = event;
            console.log(`[Diag] State: ${state}, Event: ${event}`);
        }

        // コピー・消去
        document.getElementById('copy-btn').addEventListener('click', () => {
            navigator.clipboard.writeText(resultArea.innerText);
            alert("コピーしました");
        });
        document.getElementById('clear-btn').addEventListener('click', () => {
            if(confirm("消去しますか？")) {
                finalTranscript = '';
                resultArea.innerHTML = '';
            }
        });
    </script>
</body>
</html>
