<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音声・テキストレコーダー v1.9.5</title>
    <style>
        :root { 
            --bg-color: #ffffff; 
            --text-color: #1e293b; 
            --accent-color: #ef4444; 
            --border-color: #e2e8f0; 
        }
        body { 
            font-family: -apple-system, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 16px; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            box-sizing: border-box;
            overflow: hidden;
        }
        .container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            max-width: 500px; 
            margin: 0 auto; 
            width: 100%; 
            height: 100%;
        }

        /* 確定済み：テキストエリア */
        #result-area { 
            flex: 0 1 60%; 
            border: 2px solid var(--border-color); 
            border-radius: 20px; 
            padding: 15px; 
            overflow-y: auto; 
            white-space: pre-wrap; 
            font-size: 1.2rem;
            line-height: 1.6;
            background: #fafafa;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        
        /* 確定済み：操作エリア */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 10px;
        }

        /* 確定済み：録音ボタンアニメーション */
        #main-btn { 
            width: 65px; 
            height: 65px; 
            border-radius: 50%; 
            background: var(--accent-color); 
            border: none; 
            cursor: pointer; 
            align-self: center; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
            flex-shrink: 0;
            position: relative;
        }

        #main-btn.active { 
            border-radius: 15%; 
            transform: scale(0.75); 
            background: #b91c1c;
        }
        
        /* 確定済み：アクションボタン */
        .action-row { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
        }

        .sec-btn { 
            background: #f1f5f9; 
            border: none; 
            padding: 16px; 
            border-radius: 14px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1.1rem; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #clear-btn { 
            background: #fee2e2;
            color: #b91c1c;
            padding: 12px;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="result-area"></div>
        
        <div class="controls">
            <button id="main-btn"></button>
            
            <div class="action-row">
                <button class="sec-btn" id="save-txt-btn">💾 テキスト保存</button>
                <button class="sec-btn" id="save-audio-btn">🎙️ 音声保存</button>
            </div>
            <button class="sec-btn" id="clear-btn">🗑️ すべて消去</button>
        </div>
    </div>

    <script>
        const APP_VERSION = "1.9.5";
        let recognition, mediaRecorder, audioChunks = [];
        let silenceTimer = null;
        let lastTranscript = "";
        let isFirstRecognition = true;

        const resultArea = document.getElementById('result-area');
        const mainBtn = document.getElementById('main-btn');

        function getTimestamp() {
            const now = new Date();
            return `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}] `;
        }

        function handleSilence() {
            if (resultArea.innerText.length > 0 && !resultArea.innerText.endsWith('\n')) {
                resultArea.innerText += '\n';
                isFirstRecognition = true; // 次の発話時にタイムスタンプを付与
            }
        }

        /* --- 確定済み録音ロジック (.m4a互換) --- */
        mainBtn.onclick = async () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                if (recognition) recognition.stop();
                clearTimeout(silenceTimer);
                mainBtn.classList.remove('active');
            } else {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioChunks = [];
                    const mimeType = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : 'audio/webm';
                    mediaRecorder = new MediaRecorder(stream, { mimeType });
                    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
                    mediaRecorder.start();

                    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
                    recognition.lang = 'ja-JP';
                    recognition.continuous = true;
                    recognition.interimResults = false; // 文の確定を待つ

                    recognition.onresult = (e) => {
                        clearTimeout(silenceTimer);
                        
                        const current = e.results[e.results.length - 1][0].transcript;
                        
                        if (isFirstRecognition) {
                            resultArea.innerText += getTimestamp();
                            isFirstRecognition = false;
                        }
                        
                        resultArea.innerText += current;
                        resultArea.scrollTop = resultArea.scrollHeight;

                        // 5秒間の無音判定タイマー開始
                        silenceTimer = setTimeout(handleSilence, 5000);
                    };

                    recognition.start();
                    mainBtn.classList.add('active');
                    isFirstRecognition = true;
                } catch (err) { alert("マイクへのアクセスを許可してください"); }
            }
        };

        document.getElementById('save-audio-btn').onclick = () => {
            if (audioChunks.length === 0) return alert("データがありません");
            const blob = new Blob(audioChunks, {type: 'audio/mp4'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `voice_${new Date().getTime()}.m4a`;
            a.click();
        };

        document.getElementById('save-txt-btn').onclick = () => {
            const text = resultArea.innerText;
            if (!text) return alert("テキストがありません");
            const blob = new Blob([text], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `text_${new Date().getTime()}.txt`;
            a.click();
        };

        document.getElementById('clear-btn').onclick = () => {
            if(confirm("すべて消去しますか？")) { 
                resultArea.innerText = ''; 
                audioChunks = []; 
                isFirstRecognition = true;
                clearTimeout(silenceTimer);
            }
        };
    </script>
</body>
</html>
