<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>救急STAMP V1.2.0</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; margin: 0; padding: 20px; text-align: center; }
        .card { border: 2px solid #444; border-radius: 20px; padding: 25px; background: #111; max-width: 400px; margin: auto; }
        .timer { font-size: 4.5rem; font-weight: bold; margin: 15px 0; font-family: 'Courier New', monospace; color: #00ff00; }
        button { width: 100%; padding: 20px; margin: 10px 0; font-size: 1.4rem; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; }
        .btn-start { background: #28a745; color: white; }
        #logList { margin-top: 20px; text-align: left; height: 300px; overflow-y: auto; background: #222; padding: 10px; border-radius: 10px; }
        .log-item { border-bottom: 1px solid #333; padding: 12px 0; display: flex; justify-content: space-between; font-size: 1.3rem; }
    </style>
</head>
<body>

<div class="card">
    <div id="timer" class="timer">00:00:00</div>
    <button id="startBtn" class="btn-start" onclick="startApp()">▶ 記録開始（通信維持モード）</button>
    <div id="logList"></div>
</div>

<audio id="stayAlive" loop playsinline src="https://raw.githubusercontent.com/anars/blank-audio/master/1-minute-of-silence.mp3"></audio>

<script>
    let recorder, chunks = [], startTime, timerId;
    const audio = document.getElementById('stayAlive');

    function addLog(msg) {
        const now = new Date();
        const time = now.toLocaleTimeString('ja-JP', { hour12: false });
        const item = document.createElement('div');
        item.className = 'log-item';
        item.innerHTML = `<span><b>${msg}</b></span><span style="color:#0f0">${time}</span>`;
        document.getElementById('logList').prepend(item);
        
        // 視覚フィードバック
        document.body.style.background = "#fff";
        setTimeout(() => document.body.style.background = "#000", 80);
        
        // 操作のたびに再生を再トリガーして接続を維持
        audio.play();
    }

    async function startApp() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            recorder = new MediaRecorder(stream);
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.start();

            // iPhoneで確実に音声を流す
            audio.volume = 0.1; 
            audio.play();

            setupRemote();

            startTime = new Date();
            timerId = setInterval(updateTimer, 1000);
            document.getElementById('startBtn').style.display = 'none';
            addLog("記録開始");
        } catch (e) { alert("マイクを許可してください"); }
    }

    function setupRemote() {
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: '救急現場記録：アクティブ',
                artist: 'リモコン接続中...',
                album: 'V1.2.0'
            });

            // 重要な変更：全ての操作を拾う
            const actions = [
                ['play', 'ボタン押下'],
                ['pause', 'ボタン押下'],
                ['nexttrack', '処置(+)'],
                ['previoustrack', '処置(-)']
            ];

            actions.forEach(([action, label]) => {
                navigator.mediaSession.setActionHandler(action, () => {
                    addLog(label);
                    // ボタンが押されたらSafariに「まだ音を出してるぞ」と再認識させる
                    audio.play();
                });
            });
        }
    }

    function updateTimer() {
        const diff = new Date() - startTime;
        const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
        const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
        const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
        document.getElementById('timer').textContent = `${h}:${m}:${s}`;
    }
</script>
</body>
</html>
