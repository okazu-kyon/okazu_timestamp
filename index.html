<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="icon.png">
    <title>REQ v2.5.0 (富山消防・救急記録サポーター)</title>
    <style>
        :root { 
            --bg-color: #ffffff; 
            --text-color: #1e293b; 
            --accent-color: #ef4444; 
            --border-color: #e2e8f0; 
            --tab-inactive: #94a3b8;
        }
        body { 
            font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 16px; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            box-sizing: border-box;
            overflow: hidden;
            touch-action: manipulation;
        }
        
        /* ヘッダー・設定 */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        #header-title { font-weight: 800; font-size: 1.1rem; color: var(--accent-color); margin: 0; }
        #settings-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 5px; }

        /* タブUI */
        .tab-container {
            display: flex;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 10px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            font-weight: bold;
            color: var(--tab-inactive);
            cursor: pointer;
            position: relative;
            transition: color 0.3s;
        }
        .tab.active {
            color: var(--text-color);
        }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--text-color);
        }

        /* 表示エリア */
        .content-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: #fafafa;
            margin-bottom: 15px;
        }
        .panel {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            padding: 15px;
            box-sizing: border-box;
            overflow-y: auto;
            display: none;
            white-space: pre-wrap;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .panel.active { display: block; }
        
        /* ボタン類 */
        .controls { display: flex; flex-direction: column; gap: 12px; }
        .main-btn-row { display: flex; justify-content: center; align-items: center; gap: 20px; }
        #main-btn { 
            width: 64px; height: 64px; border-radius: 50%; 
            background: var(--accent-color); border: none; cursor: pointer;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }
        #main-btn.active { border-radius: 12px; background: #b91c1c; transform: scale(0.9); }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .sec-btn { 
            background: #f1f5f9; border: none; padding: 12px; border-radius: 10px; 
            font-weight: bold; font-size: 0.85rem; cursor: pointer;
        }
        #ai-btn { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }

        /* モーダル */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-content {
            background: white; width: 85%; max-width: 350px; padding: 20px; border-radius: 15px;
        }
        input[type="password"] {
            width: 100%; padding: 10px; margin: 10px 0; border: 1px solid var(--border-color); border-radius: 8px; box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="header-row">
    <h1 id="header-title">REQ v2.5.0</h1>
    <button id="settings-btn">⚙️</button>
</div>

<div class="tab-container">
    <div class="tab active" id="tab-summary" onclick="switchTab('summary')">AI要約</div>
    <div class="tab" id="tab-transcript" onclick="switchTab('transcript')">文字起こし</div>
</div>

<div class="content-area">
    <div id="panel-summary" class="panel active">AI要約ボタンを押すと、ここに整形された報告書が表示されます。</div>
    <div id="panel-transcript" class="panel"></div>
</div>

<div class="controls">
    <div class="main-btn-row">
        <button id="main-btn"></button>
    </div>
    <div class="action-grid">
        <button class="sec-btn" id="ai-btn">✨ AI要約作成</button>
        <button class="sec-btn" id="save-txt-btn">💾 テキスト保存</button>
    </div>
    <button class="sec-btn" id="clear-btn" style="color: #ef4444;">🗑️ すべて消去</button>
</div>

<div id="settings-modal" class="modal">
    <div class="modal-content">
        <h3>Gemini API設定</h3>
        <p style="font-size: 0.8rem; color: #64748b;">Google AI Studioで取得したAPIキーを入力してください。</p>
        <input type="password" id="api-key-input" placeholder="AIzaSy...">
        <button class="sec-btn" id="save-settings" style="width: 100%; background: var(--text-color); color: white;">保存して閉じる</button>
    </div>
</div>

<script>
    let recognition;
    let finalTranscript = "";
    let isNewLine = true;
    let silenceTimer = null;

    const summaryPanel = document.getElementById('panel-summary');
    const transcriptPanel = document.getElementById('panel-transcript');
    const mainBtn = document.getElementById('main-btn');

    // タブ切り替え
    function switchTab(type) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        
        document.getElementById(`tab-${type}`).classList.add('active');
        document.getElementById(`panel-${type}`).classList.add('active');
    }

    // 設定モーダル制御
    const settingsBtn = document.getElementById('settings-btn');
    const settingsModal = document.getElementById('settings-modal');
    const apiKeyInput = document.getElementById('api-key-input');
    
    apiKeyInput.value = localStorage.getItem('gemini_api_key') || "";
    settingsBtn.onclick = () => settingsModal.style.display = 'flex';
    document.getElementById('save-settings').onclick = () => {
        localStorage.setItem('gemini_api_key', apiKeyInput.value);
        settingsModal.style.display = 'none';
    };

    // 音声認識
    mainBtn.onclick = () => {
        if (recognition && mainBtn.classList.contains('active')) {
            recognition.stop();
            mainBtn.classList.remove('active');
            clearTimeout(silenceTimer);
            return;
        }

        try {
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'ja-JP'; recognition.continuous = true; recognition.interimResults = true;
            
            recognition.onresult = (e) => {
                let interim = "";
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    let text = e.results[i][0].transcript;
                    if (e.results[i].isFinal) {
                        if (isNewLine) { finalTranscript += new Date().toLocaleTimeString() + " "; isNewLine = false; }
                        finalTranscript += text;
                        clearTimeout(silenceTimer);
                        silenceTimer = setTimeout(() => { finalTranscript += "\n"; isNewLine = true; }, 5000);
                    } else { interim = text; }
                }
                transcriptPanel.innerText = finalTranscript + interim;
                transcriptPanel.scrollTop = transcriptPanel.scrollHeight;
            };
            recognition.start();
            mainBtn.classList.add('active');
            switchTab('transcript');
        } catch (e) { alert("マイクが使用できません"); }
    };

    // Gemini API連携
    document.getElementById('ai-btn').onclick = async () => {
        const key = localStorage.getItem('gemini_api_key');
        if (!key) { alert("⚙️ボタンからAPIキーを設定してください"); return; }
        if (!finalTranscript) { alert("文字起こしデータがありません"); return; }

        summaryPanel.innerText = "✨ AIが要約中...";
        switchTab('summary');

        const prompt = `あなたは富山消防のベテラン救急隊員です。以下の現場メモを読み取り、医療報告書として構造化して整理してください。
出力項目：【現着】【傷病者情報】【主訴・所見】【バイタル】【経過・処置】
メモ：\n${finalTranscript}`;

        try {
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await resp.json();
            const result = data.candidates[0].content.parts[0].text;
            summaryPanel.innerText = result;
        } catch (e) {
            summaryPanel.innerText = "エラーが発生しました。APIキーを確認してください。";
        }
    };

    document.getElementById('save-txt-btn').onclick = () => {
        const blob = new Blob([summaryPanel.innerText + "\n\n---元データ---\n" + finalTranscript], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `REQ_report_${new Date().getTime()}.txt`;
        a.click();
    };

    document.getElementById('clear-btn').onclick = () => {
        if(confirm("データをすべて消去しますか？")) {
            finalTranscript = "";
            transcriptPanel.innerText = "";
            summaryPanel.innerText = "AI要約ボタンを押すと、ここに整形された報告書が表示されます。";
            isNewLine = true;
        }
    };
</script>
</body>
</html>
