<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voice Recorder v1.0.1</title>
    <style>
        /* Version: 1.0.1 */
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --accent-color: #007aff;
            --active-color: #34c759;
            --stop-color: #ff3b30;
            --border-radius: 12px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100dvh;
            overflow: hidden;
        }

        h1 {
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 15px;
            color: var(--accent-color);
        }

        button {
            touch-action: manipulation;
            font-size: 16px;
            border: none;
            border-radius: var(--border-radius);
            padding: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        #main-btn {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        #main-btn.recording {
            background-color: var(--stop-color);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        #result-area {
            flex: 1;
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 15px;
            overflow-y: auto;
            margin-bottom: 15px;
            line-height: 1.6;
            font-size: 16px;
            white-space: pre-wrap;
            border: 1px solid #444;
        }

        .interim {
            color: var(--active-color);
            font-weight: bold;
        }

        .controls-bottom {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .secondary-btn {
            background-color: #444;
            color: white;
        }

        #status-bar {
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
            padding: 5px;
            border-radius: 4px;
            transition: background 0.3s;
        }

        #error-log {
            font-size: 12px;
            color: var(--stop-color);
            text-align: center;
            margin-top: 5px;
            min-height: 1.2em;
        }
    </style>
</head>
<body>

    <h1>Speech to Text v1.0.1</h1>

    <button id="main-btn">録音開始 (Tap to Start)</button>

    <div id="result-area"></div>

    <div class="controls-bottom">
        <button id="copy-btn" class="secondary-btn">コピー</button>
        <button id="clear-btn" class="secondary-btn">消去</button>
    </div>

    <div id="status-bar">Status: Ready</div>
    <div id="error-log"></div>

    <script>
        /**
         * 音響ロジック定義書（修正版 v1.0.1）
         * 1. continuous: false (iOSでのフリーズ回避のため、あえてfalseに設定し手動ループさせる)
         * 2. interimResults: true (リアルタイムフィードバック維持)
         */
        const recognitionConfig = {
            lang: 'ja-JP',
            continuous: false, 
            interimResults: true
        };

        const mainBtn = document.getElementById('main-btn');
        const copyBtn = document.getElementById('copy-btn');
        const clearBtn = document.getElementById('clear-btn');
        const resultArea = document.getElementById('result-area');
        const statusBar = document.getElementById('status-bar');
        const errorLog = document.getElementById('error-log');

        let recognition = null;
        let isRecording = false;
        let finalTranscript = '';

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            showError("お使いのブラウザはWeb Speech APIに対応していません。");
        } else {
            initRecognition();
        }

        function initRecognition() {
            recognition = new SpeechRecognition();
            Object.assign(recognition, recognitionConfig);

            recognition.onstart = () => {
                updateStatus("音声検知待ち...", true);
                showError(""); 
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript + '。';
                    } else {
                        interimTranscript += transcript;
                    }
                }
                updateStatus("音声入力中！！", true, true);
                renderText(interimTranscript);
            };

            recognition.onerror = (event) => {
                console.error("Recognition Error:", event.error);
                showError(`Error: ${event.error}`);
                
                // iOSで頻発する 'network' エラー等でも録音状態なら維持を試みる
                if (event.error === 'not-allowed') {
                    isRecording = false;
                    updateUI();
                }
            };

            recognition.onend = () => {
                // 擬似連続認識ロジック: 録音中フラグが立っていれば即座に再起動
                if (isRecording) {
                    try {
                        recognition.start();
                    } catch (e) {
                        console.log("Restart failed, retrying...", e);
                        setTimeout(() => { if(isRecording) recognition.start(); }, 300);
                    }
                } else {
                    updateStatus("停止中", false);
                }
            };
        }

        mainBtn.addEventListener('click', () => {
            if (!isRecording) {
                startRecording();
            } else {
                stopRecording();
            }
        });

        function startRecording() {
            isRecording = true;
            finalTranscript = resultArea.innerText ? resultArea.innerText + '\n' : '';
            updateUI();
            try {
                recognition.start();
            } catch (e) {
                showError("起動失敗: " + e.message);
                isRecording = false;
                updateUI();
            }
        }

        function stopRecording() {
            isRecording = false;
            updateUI();
            recognition.stop();
        }

        function updateUI() {
            if (isRecording) {
                mainBtn.innerText = "録音停止";
                mainBtn.classList.add('recording');
            } else {
                mainBtn.innerText = "録音開始 (Tap to Start)";
                mainBtn.classList.remove('recording');
            }
        }

        function renderText(interim) {
            resultArea.innerHTML = finalTranscript + '<span class="interim">' + interim + '</span>';
            resultArea.scrollTop = resultArea.scrollHeight;
        }

        function updateStatus(msg, active, detecting = false) {
            statusBar.innerText = `Status: ${msg}`;
            statusBar.style.background = detecting ? "#34c75944" : "transparent";
            statusBar.style.color = detecting ? "var(--active-color)" : "var(--text-color)";
        }

        function showError(msg) {
            errorLog.innerText = msg;
        }

        // コピー・消去機能
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(resultArea.innerText).then(() => {
                const prev = copyBtn.innerText;
                copyBtn.innerText = "完了！";
                setTimeout(() => copyBtn.innerText = prev, 1500);
            });
        });

        clearBtn.addEventListener('click', () => {
            if (confirm("全消去しますか？")) {
                finalTranscript = '';
                resultArea.innerHTML = '';
            }
        });
    </script>
</body>
</html>
