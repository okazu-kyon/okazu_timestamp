<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Recorder v1.3.1</title>
    <style>
        /* Version: 1.3.1 */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #efefef;
            --accent-color: #0a84ff;
            --active-color: #30d158;
            --stop-color: #ff453a;
            --timestamp-color: #64d2ff;
            --border-radius: 14px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column;
            height: 100dvh; overflow: hidden;
        }

        #meter-container {
            width: 100%; height: 6px;
            background: #333; border-radius: 3px;
            margin-bottom: 8px; overflow: hidden;
        }
        #meter-bar {
            width: 0%; height: 100%;
            background: var(--active-color);
            transition: width 0.1s ease-out;
        }

        #diag-panel {
            background: #000; padding: 10px; border-radius: 10px;
            font-family: monospace; font-size: 11px; margin-bottom: 10px;
            border: 1px solid #333; display: grid; grid-template-columns: 1fr 1fr; gap: 5px;
        }

        .flash-active { animation: status-flash 0.3s ease; }
        @keyframes status-flash {
            0% { background-color: transparent; }
            50% { background-color: rgba(48, 209, 88, 0.3); }
            100% { background-color: transparent; }
        }

        #main-btn {
            touch-action: manipulation; width: 100%;
            background-color: var(--accent-color); color: white;
            border: none; border-radius: var(--border-radius);
            padding: 20px; font-size: 1.1rem; font-weight: bold; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        #main-btn.recording { background-color: var(--stop-color); }

        #rec-dot {
            width: 10px; height: 10px; background: white; border-radius: 50%;
            display: none;
        }
        #main-btn.recording #rec-dot {
            display: inline-block; animation: blink 1s infinite;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        #result-area {
            flex: 1; background-color: var(--card-bg); border-radius: var(--border-radius);
            padding: 15px; overflow-y: auto; margin-bottom: 15px;
            font-size: 16px; line-height: 1.8; white-space: pre-wrap;
            border: 1px solid #333;
        }

        .timestamp { color: var(--timestamp-color); font-weight: bold; font-size: 0.85em; margin-right: 8px; }
        .interim { color: var(--active-color); opacity: 0.8; font-style: italic; }

        .bottom-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .sec-btn {
            touch-action: manipulation; background: #333; color: white;
            border: none; padding: 12px 5px; border-radius: 10px; font-weight: bold; font-size: 0.85rem;
        }
        .save-btn { background-color: var(--active-color); color: white; }

        #error-display { color: var(--stop-color); font-size: 11px; text-align: center; margin-top: 5px; min-height: 15px; }
    </style>
</head>
<body>

    <div id="meter-container"><div id="meter-bar"></div></div>

    <div id="diag-panel">
        <div class="diag-item">Rec: <span id="diag-state">idle</span></div>
        <div class="diag-item">Data: <span id="diag-data">waiting</span></div>
    </div>

    <button id="main-btn">
        <span id="rec-dot"></span>
        <span id="btn-text">解析・録音を開始</span>
    </button>

    <div id="result-area"></div>

    <div class="bottom-btns">
        <button id="copy-btn" class="sec-btn">コピー</button>
        <button id="save-btn" class="sec-btn save-btn">保存</button>
        <button id="clear-btn" class="sec-btn">消去</button>
    </div>

    <div id="error-display"></div>

    <script>
        /**
         * 音響ロジック定義書 v1.3.1 (自己修復強化型)
         * 1. Speech Recognition: continuous: false, maxAlternatives: 1
         * 2. Auto Recovery: 500ms delay on error/end if isRecording=true
         * 3. Stream Sharing: Analyser and Recorder share same mic stream
         */
        const config = { lang: 'ja-JP', continuous: false, interimResults: true, maxAlternatives: 1 };
        const BLANK_THRESHOLD = 5000;
        
        const mainBtn = document.getElementById('main-btn');
        const btnText = document.getElementById('btn-text');
        const resultArea = document.getElementById('result-area');
        const meterBar = document.getElementById('meter-bar');
        const diagState = document.getElementById('diag-state');
        const diagData = document.getElementById('diag-data');
        const errorDisplay = document.getElementById('error-display');

        let isRecording = false;
        let recognition = null;
        let audioContext = null;
        let analyser = null;
        let dataArray = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let audioBlob = null;
        let lastSpeechTime = 0;
        let fullLogHTML = '';

        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;

        window.onload = () => {
            if (!Speech) {
                errorDisplay.innerText = "Speech API がサポートされていません。Safariで開いてください。";
            } else {
                initRecognition();
            }
        };

        function initRecognition() {
            recognition = new Speech();
            Object.assign(recognition, config);

            recognition.onstart = () => {
                diagState.innerText = "RUNNING";
                diagState.style.color = "var(--active-color)";
            };

            recognition.onresult = (event) => {
                // ビジュアルデバッグ: 着信時にフラッシュ
                document.getElementById('diag-panel').classList.add('flash-active');
                setTimeout(() => document.getElementById('diag-panel').classList.remove('flash-active'), 300);
                diagData.innerText = "RECEIVING";

                let interim = '';
                const now = Date.now();

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        if (now - lastSpeechTime > BLANK_THRESHOLD) {
                            fullLogHTML += (fullLogHTML ? '\n' : '') + `<span class="timestamp">${getTimestamp()}</span>`;
                        }
                        fullLogHTML += transcript + ' ';
                        lastSpeechTime = now;
                    } else {
                        interim += transcript;
                    }
                }
                resultArea.innerHTML = fullLogHTML + (interim ? `<span class="interim">${interim}</span>` : '');
                resultArea.scrollTop = resultArea.scrollHeight;
            };

            recognition.onerror = (e) => {
                errorDisplay.innerText = "Log: " + e.error;
                console.error("Recognition Error:", e.error);
                if (isRecording && (e.error === 'network' || e.error === 'aborted')) {
                    attemptRestart(500);
                }
            };

            recognition.onend = () => {
                diagState.innerText = "STOPPED";
                diagState.style.color = "var(--stop-color)";
                if (isRecording) attemptRestart(200);
            };
        }

        function attemptRestart(delay) {
            setTimeout(() => {
                if (isRecording) {
                    try {
                        recognition.lang = 'ja-JP'; // 言語を再固定
                        recognition.start();
                    } catch (err) {
                        console.log("Restart failed, retrying...");
                    }
                }
            }, delay);
        }

        async function startSystem() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                // MediaRecorderの初期化 (ストリームを共有)
                const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
                mediaRecorder = new MediaRecorder(stream, { mimeType });
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
                };
            }
            
            if (audioContext.state === 'suspended') await audioContext.resume();
            
            audioChunks = [];
            audioBlob = null;
            isRecording = true;
            
            if (!fullLogHTML) {
                fullLogHTML = `<span class="timestamp">${getTimestamp()}</span>`;
                lastSpeechTime = Date.now();
            }

            btnText.innerText = "解析・録音を停止";
            mainBtn.classList.add('recording');
            
            recognition.start();
            mediaRecorder.start();
            updateMeter();
        }

        mainBtn.addEventListener('click', () => {
            if (!isRecording) {
                startSystem().catch(err => {
                    alert("マイク許可が必要です");
                    console.error(err);
                });
            } else {
                isRecording = false;
                btnText.innerText = "解析・録音を開始";
                mainBtn.classList.remove('recording');
                recognition.stop();
                mediaRecorder.stop();
            }
        });

        function updateMeter() {
            if (!isRecording) { meterBar.style.width = '0%'; return; }
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
            let level = (sum / dataArray.length) * 2;
            meterBar.style.width = Math.min(level, 100) + '%';
            requestAnimationFrame(updateMeter);
        }

        function getTimestamp(forFileName = false) {
            const now = new Date();
            const pad = (n) => n.toString().padStart(2, '0');
            if (forFileName) return `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
            return `[${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}]`;
        }

        document.getElementById('save-btn').addEventListener('click', () => {
            if (!fullLogHTML && !audioBlob) return;
            const baseName = getTimestamp(true);
            
            // テキスト保存
            const textBlob = new Blob([resultArea.innerText], { type: 'text/plain' });
            download(textBlob, `text_${baseName}.txt`);

            // 音声保存
            if (audioBlob) {
                const ext = mediaRecorder.mimeType.includes('webm') ? 'webm' : 'm4a';
                download(audioBlob, `audio_${baseName}.${ext}`);
            }
        });

        function download(blob, name) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = name;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
        }

        document.getElementById('copy-btn').addEventListener('click', () => {
            navigator.clipboard.writeText(resultArea.innerText).then(() => alert("コピー完了"));
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            if(confirm("データを全消去しますか？")) {
                fullLogHTML = ''; resultArea.innerHTML = ''; audioChunks = []; audioBlob = null;
            }
        });
    </script>
</body>
</html>
