    <title>REQ v2.3.0 (富山消防・救急記録サポーター)</title>
    <style>
        :root { 
            --bg-color: #ffffff; 
            --text-color: #1e293b; 
            --accent-color: #ef4444; 
            --border-color: #e2e8f0; 
        }
        body { 
            font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 16px; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            box-sizing: border-box;
            overflow: hidden;
            touch-action: manipulation;
        }
        /* ポップアップガイド */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        #guide-box {
            background: white;
            width: 85%;
            max-width: 400px;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        #guide-box h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: var(--accent-color);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }
        #guide-box ul {
            padding-left: 20px;
            font-size: 0.85rem;
            line-height: 1.6;
            margin: 15px 0;
        }
        #guide-box li { margin-bottom: 8px; }
        #close-guide {
            width: 100%;
            padding: 14px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }

        .container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            max-width: 500px; 
            margin: 0 auto; 
            width: 100%; 
            height: 100%;
        }
        #header-title {
            text-align: center;
            font-weight: 800;
            font-size: 1.2rem;
            margin: 0;
            color: var(--accent-color);
        }
        #result-area { 
            flex: 0 1 60%; 
            border: 2px solid var(--border-color); 
            border-radius: 20px; 
            padding: 15px; 
            overflow-y: auto; 
            white-space: pre-wrap; 
            font-size: 0.9rem; 
            line-height: 1.6;
            background: #fafafa;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 10px;
        }
        #main-btn { 
            width: 70px; 
            height: 70px; 
            border-radius: 50%; 
            background: var(--accent-color); 
            border: none; 
            cursor: pointer; 
            align-self: center; 
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.5);
            flex-shrink: 0;
        }
        #main-btn.active { 
            border-radius: 12px; 
            transform: scale(0.85); 
            background: #b91c1c;
        }
        .action-row { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
        }
        .sec-btn { 
            background: #f1f5f9; 
            border: none; 
            padding: 12px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 0.9rem; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        #clear-btn { 
            background: #fee2e2;
            color: #b91c1c;
            padding: 12px;
        }
    </style>
</head>

            "ふくしゃ": "輻射", "ねつでんどう": "熱伝導", "たいりゅう": "対流", "あかたぐ": "重症(赤)", "きたぐ": "中等症(黄)",
            "みどりたぐ": "軽症(緑)", "しれい": "指令", "けいちょう": "聴取"

        const AUTO_CORRECT_MAP = {
            "相川": "総曲輪", "早川": "総曲輪", "府中": "婦中町", "八百": "八尾町", "五服": "五福"
        };

        let recognition, mediaRecorder, audioChunks = [];
        let silenceTimer = null;
        let finalTranscript = ""; 
        let isNewLine = true;

        const resultArea = document.getElementById('result-area');
        const mainBtn = document.getElementById('main-btn');

        function getFileTimestamp() {
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            return `${y}${m}${d}_${hh}${mm}${ss}`;
        }

        function forceToyamaCorrect(text) {
            if (!text) return text;
            let corrected = text;
            for (const [wrong, right] of Object.entries(AUTO_CORRECT_MAP)) {
                corrected = corrected.replace(new RegExp(wrong, 'g'), right);
            }
            const sortedKeys = Object.keys(TOYAMA_FORCE_DICT).sort((a, b) => b.length - a.length);
            for (const key of sortedKeys) {
                corrected = corrected.replace(new RegExp(key, 'g'), TOYAMA_FORCE_DICT[key]);
            }
            return corrected;
        }

        function getTimestamp() {
            const now = new Date();
            return `${now.getHours()}時${now.getMinutes()}分${now.getSeconds()}秒 `;
        }

        mainBtn.onclick = async () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop(); if (recognition) recognition.stop();
                clearTimeout(silenceTimer); mainBtn.classList.remove('active');
            } else {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioChunks = [];
                    const mimeType = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : 'audio/webm';
                    mediaRecorder = new MediaRecorder(stream, { mimeType });
                    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
                    mediaRecorder.start();

                    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
                    recognition.lang = 'ja-JP'; recognition.continuous = true; recognition.interimResults = true;

                    recognition.onresult = (e) => {
                        let interim = ""; let hasNewFinal = false;
                        for (let i = e.resultIndex; i < e.results.length; ++i) {
                            let transcript = forceToyamaCorrect(e.results[i][0].transcript);
                            if (e.results[i].isFinal) {
                                if (isNewLine) { finalTranscript += getTimestamp(); isNewLine = false; }
                                finalTranscript += transcript; hasNewFinal = true;
                            } else { interim += transcript; }
                        }
                        if (hasNewFinal) {
                            clearTimeout(silenceTimer);
                            silenceTimer = setTimeout(() => {
                                if (finalTranscript !== "" && !finalTranscript.endsWith('\n')) {
                                    finalTranscript += '\n'; resultArea.innerText = finalTranscript; isNewLine = true;
                                }
                            }, 5000);
                        }
                        resultArea.innerText = finalTranscript + (isNewLine && interim ? getTimestamp() : "") + interim;
                        resultArea.scrollTop = resultArea.scrollHeight;
                    };
                    recognition.start(); mainBtn.classList.add('active'); isNewLine = true;
                } catch (err) { alert("マイク使用を許可してください"); }
            }
        };

        document.getElementById('save-audio-btn').onclick = () => {
            if (audioChunks.length === 0) return alert("データがありません");
            const blob = new Blob(audioChunks, {type: 'audio/mp4'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `REQ_audio_${getFileTimestamp()}.m4a`; a.click();
        };

        document.getElementById('save-txt-btn').onclick = () => {
            const text = resultArea.innerText;
            if (!text) return alert("テキストがありません");
            const blob = new Blob([text], {type: 'text/plain'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `REQ_log_${getFileTimestamp()}.txt`; a.click();
        };

        document.getElementById('clear-btn').onclick = () => {
            if(confirm("すべて消去しますか？")) { 
                resultArea.innerText = ''; finalTranscript = ''; audioChunks = []; isNewLine = true;
                clearTimeout(silenceTimer);
            }
        };
