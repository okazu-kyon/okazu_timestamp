<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音声・テキストレコーダー v1.7.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #0ea5e9;
            --active-color: #10b981;
            --stop-color: #ef4444;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --timestamp-color: #38bdf8;
            --border-radius: 16px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-color);
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            height: 100dvh;
            overflow: hidden;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            height: 100%;
            gap: 10px;
        }

        /* インジケーター */
        #meter-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            overflow: hidden;
        }

        #meter-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--active-color), #34d399);
            transition: width 0.1s ease-out;
        }

        #diag-panel {
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 12px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 録音ボタン */
        #main-btn {
            touch-action: manipulation;
            width: 100%;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        #main-btn.recording {
            background: var(--stop-color);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }

        /* テキスト表示エリア (最大化) */
        #result-area {
            flex: 1;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 14px;
            padding: 20px;
            overflow-y: auto;
            font-size: 18px;
            line-height: 1.6;
            white-space: pre-wrap;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.2);
            min-height: 0;
        }

        .timestamp {
            color: var(--timestamp-color);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
            background: rgba(56, 189, 248, 0.1);
            padding: 1px 4px;
            border-radius: 3px;
            margin-right: 8px;
        }

        /* 設定パネル */
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background: rgba(255, 255, 255, 0.03);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .setting-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        input[type="range"] {
            height: 6px;
            width: 100%;
            cursor: pointer;
        }

        /* 操作ボタン */
        .bottom-btns {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .sec-btn {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .save-btn {
            background: var(--active-color);
            border: none;
        }

        #version-tag {
            text-align: center;
            font-size: 0.65rem;
            color: var(--text-muted);
            opacity: 0.6;
            margin-top: 4px;
            cursor: pointer;
            text-decoration: underline;
        }

        /* モーダル */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: #1e293b;
            margin: 15% auto;
            padding: 24px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- 上部インジケーター -->
        <div id="meter-container">
            <div id="meter-bar"></div>
        </div>
        <div id="diag-panel">
            <div>状態: <span id="diag-state">待機中</span></div>
            <div>音声保存: <span id="diag-rec">OFF</span></div>
        </div>

        <!-- 録音ボタン -->
        <button id="main-btn">
            <span id="rec-dot" style="width:12px;height:12px;background:white;border-radius:50%;display:none;"></span>
            <span id="btn-text">録音・文字起こしを開始</span>
        </button>

        <!-- メイン表示エリア -->
        <div id="result-area"></div>

        <div id="error-display" style="color:var(--stop-color); font-size:11px; text-align:center;"></div>

        <!-- 設定パネル -->
        <div class="settings-grid">
            <div class="setting-item">
                <div class="setting-label"><span>マイク感度</span><span id="gain-val">x2.5</span></div>
                <input type="range" id="gain-slider" min="1" max="10" step="0.5" value="2.5">
            </div>
            <div class="setting-item">
                <div class="setting-label"><span>無音で改行</span><span id="threshold-val">5秒</span></div>
                <input type="range" id="threshold-slider" min="1" max="15" step="1" value="5">
            </div>
        </div>

        <!-- アクション -->
        <div class="bottom-btns">
            <button id="copy-btn" class="sec-btn">📋 コピー</button>
            <button id="save-btn" class="sec-btn save-btn">💾 保存</button>
            <button id="clear-btn" class="sec-btn">🗑️ 消去</button>
        </div>
        <div id="version-tag" onclick="document.getElementById('helpModal').style.display='block'">使い方のヒント</div>
    </div>

    <!-- ヘルプモーダル -->
    <div id="helpModal" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--accent-color); margin-top:0;">💡 使い方</h3>
            <ul style="font-size:0.9rem; padding-left:20px; line-height:1.6;">
                <li><b>開始/停止</b>: 青いボタンで録音と文字起こしをコントロールします。</li>
                <li><b>保存</b>: 終了後に緑の保存ボタンを押すと、テキスト(.txt)と音声ファイルがダウンロードされます。</li>
                <li><b>感度調整</b>: 音を拾いにくい場合は感度を上げてください。</li>
            </ul>
            <button onclick="this.parentElement.parentElement.style.display='none'"
                style="width:100%; padding:12px; background:var(--accent-color); border:none; border-radius:10px; color:white; font-weight:bold; cursor:pointer; margin-top:10px;">閉じる</button>
        </div>
    </div>

    <script>
        const config = { lang: 'ja-JP', continuous: true, interimResults: true, maxAlternatives: 1 };
        let blankThreshold = 5000;
        let meterGain = 2.5;

        const mainBtn = document.getElementById('main-btn');
        const btnText = document.getElementById('btn-text');
        const resultArea = document.getElementById('result-area');
        const meterBar = document.getElementById('meter-bar');
        const dState = document.getElementById('diag-state');
        const dRec = document.getElementById('diag-rec');
        const gainSlider = document.getElementById('gain-slider');
        const gainVal = document.getElementById('gain-val');
        const thresholdSlider = document.getElementById('threshold-slider');
        const thresholdVal = document.getElementById('threshold-val');

        let isRecording = false;
        let recognition = null;
        let audioContext = null;
        let analyser = null;
        let dataArray = null;

        let mediaRecorder = null;
        let activeStream = null;
        let audioChunks = [];
        let audioBlob = null;

        let lastSpeechTime = 0;
        let fullLogHTML = '';

        window.onload = () => {
            if (window.location.protocol === 'file:') {
                document.getElementById('error-display').innerHTML = '⚠️ localhost または Webサーバー経由での実行を推奨します';
            }

            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (Speech) {
                recognition = new Speech();
                Object.assign(recognition, config);
                setupRecognitionEvents();
            } else {
                document.getElementById('error-display').innerText = "お使いのブラウザは音声認識に対応していません";
            }
        };

        gainSlider.oninput = () => { meterGain = parseFloat(gainSlider.value); gainVal.innerText = `x${meterGain}`; };
        thresholdSlider.oninput = () => { blankThreshold = parseInt(thresholdSlider.value) * 1000; thresholdVal.innerText = `${thresholdSlider.value}秒`; };

        async function initAudioAndRecorder() {
            if (!activeStream) {
                activeStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                const source = audioContext.createMediaStreamSource(activeStream);
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }
            if (audioContext.state === 'suspended') await audioContext.resume();

            mediaRecorder = new MediaRecorder(activeStream);
            mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                dRec.innerText = "保存可能";
            };
        }

        function setupRecognitionEvents() {
            recognition.onresult = (event) => {
                let interim = '';
                const now = Date.now();
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        if (now - lastSpeechTime > blankThreshold || fullLogHTML === '') {
                            fullLogHTML += (fullLogHTML ? '<br>' : '') + `<span class="timestamp">${new Date().toLocaleTimeString()}</span> `;
                        }
                        fullLogHTML += transcript + ' ';
                        lastSpeechTime = now;
                    } else { interim += transcript; }
                }
                resultArea.innerHTML = fullLogHTML + (interim ? `<span style="color:var(--active-color); opacity:0.7;">${interim}</span>` : '');
                resultArea.scrollTop = resultArea.scrollHeight;
            };
            recognition.onend = () => {
                if (isRecording) {
                    setTimeout(() => { if (isRecording) try { recognition.start(); } catch (e) { } }, 200);
                }
            };
        }

        mainBtn.onclick = async () => {
            if (!isRecording) {
                try {
                    await initAudioAndRecorder();
                    audioChunks = []; audioBlob = null;
                    isRecording = true;
                    btnText.innerText = "録音を停止・保存可能にする";
                    mainBtn.classList.add('recording');
                    document.getElementById('rec-dot').style.display = 'inline-block';
                    recognition.start(); mediaRecorder.start();
                    dRec.innerText = "録音中...";
                    dState.innerText = "認識中";
                    updateMeter();
                } catch (e) { alert("マイクの使用を許可してください"); }
            } else {
                isRecording = false;
                btnText.innerText = "録音・文字起こしを開始";
                mainBtn.classList.remove('recording');
                document.getElementById('rec-dot').style.display = 'none';
                recognition.stop(); mediaRecorder.stop();
                dState.innerText = "停止中";
            }
        };

        function updateMeter() {
            if (!isRecording) { meterBar.style.width = '0%'; return; }
            analyser.getByteFrequencyData(dataArray);
            let max = 0;
            for (let i = 0; i < dataArray.length; i++) if (dataArray[i] > max) max = dataArray[i];
            meterBar.style.width = Math.min((max / 255) * 100 * meterGain, 100) + '%';
            requestAnimationFrame(updateMeter);
        }

        document.getElementById('save-btn').onclick = () => {
            if (!fullLogHTML && !audioBlob) { alert("保存するデータがありません"); return; }
            const fileName = `記録_${new Date().toLocaleString().replace(/[\/: ]/g, '_')}`;
            if (fullLogHTML) download(resultArea.innerText, `${fileName}.txt`, 'text/plain');
            if (audioBlob) download(audioBlob, `${fileName}.webm`, 'audio/webm');
        };

        document.getElementById('copy-btn').onclick = () => {
            if (!fullLogHTML) return;
            navigator.clipboard.writeText(resultArea.innerText).then(() => alert("コピーしました"));
        };

        document.getElementById('clear-btn').onclick = () => {
            if (confirm("記録を消去しますか？")) {
                fullLogHTML = ''; resultArea.innerHTML = '';
                audioChunks = []; audioBlob = null;
                dRec.innerText = "OFF";
            }
        };

        function download(content, name, type) {
            const blob = content instanceof Blob ? content : new Blob([content], { type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = name; a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>

</html>
